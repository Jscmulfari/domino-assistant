<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Domino Assistant</title>
  <style>
    :root{
      --bg-top:#4b5268;
      --bg-mid:#39415a;
      --bg-bottom:#2c344d;
      --text:#f5f7fb;
      --muted:#d9deeb;
      --pair:#596178;
      --pair-bottom:#50576d;
      --pair-border:rgba(225,232,246,.34);
      --green:#79da6c;
      --green-2:#68cb59;
      --green-border:#bcf5b3;
      --green-shadow:rgba(104,203,89,.18);
      --tile-frame:rgba(70,78,103,.38);
      --tile-border:rgba(225,232,246,.18);
      --tile-selected:rgba(121,218,108,.14);
      --domino:#f3ebdc;
      --domino-top:#fbf7ef;
      --domino-edge:rgba(123,110,92,.42);
      --domino-line:#877d71;
      --pip:#665b4f;
      --tray:#3d4561;
      --tray-border:rgba(214,222,238,.3);
      --shadow:rgba(0,0,0,.22);
      --wood-top:#7a573a;
      --wood-mid:#5a3c28;
      --wood-bottom:#392417;
      --wood-panel:#7b5639;
      --wood-panel-bottom:#66452f;
      --wood-panel-border:rgba(250,228,196,.24);
      --wood-tray:#4b3121;
      --wood-tray-border:rgba(238,214,186,.24);
      --wood-shadow:rgba(16,8,3,.3);
      --wood-grain:linear-gradient(100deg, rgba(255,231,203,.08) 0%, rgba(255,231,203,0) 14%, rgba(70,42,22,.16) 20%, rgba(255,231,203,0) 29%, rgba(58,35,18,.2) 36%, rgba(255,231,203,0) 44%, rgba(91,56,31,.18) 53%, rgba(255,231,203,0) 62%, rgba(71,42,20,.18) 72%, rgba(255,231,203,0) 82%, rgba(109,68,38,.14) 100%);
    }

    html[data-theme="midnight"]{
      --bg-top:#4b5268;
      --bg-mid:#39415a;
      --bg-bottom:#2c344d;
      --text:#f5f7fb;
      --muted:#d9deeb;
      --pair:#596178;
      --pair-bottom:#50576d;
      --pair-border:rgba(225,232,246,.34);
      --tile-frame:rgba(70,78,103,.38);
      --tile-border:rgba(225,232,246,.18);
      --tile-selected:rgba(121,218,108,.14);
      --tray:#3d4561;
      --tray-border:rgba(214,222,238,.3);
      --shadow:rgba(0,0,0,.22);
    }

    html[data-theme="wood"]{
      --bg-top:var(--wood-top);
      --bg-mid:var(--wood-mid);
      --bg-bottom:var(--wood-bottom);
      --text:#f8f2e8;
      --muted:#ead9c4;
      --pair:var(--wood-panel);
      --pair-bottom:var(--wood-panel-bottom);
      --pair-border:var(--wood-panel-border);
      --tile-frame:rgba(118,82,57,.34);
      --tile-border:rgba(250,228,196,.16);
      --tile-selected:rgba(132,195,96,.12);
      --tray:var(--wood-tray);
      --tray-border:var(--wood-tray-border);
      --shadow:var(--wood-shadow);
      --domino:#f2e7d5;
      --domino-top:#fbf7ee;
      --domino-edge:rgba(111,82,55,.44);
      --domino-line:#806850;
      --pip:#5c4533;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 50% -14%, rgba(255,255,255,.07), transparent 28%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 34%, var(--bg-bottom) 100%);
      transition:background .2s ease,color .2s ease;
    }

    html[data-theme="wood"] body{
      background:
        radial-gradient(circle at 50% -18%, rgba(255,241,220,.08), transparent 26%),
        linear-gradient(180deg, rgba(255,231,203,.06), rgba(255,231,203,0) 24%),
        var(--wood-grain),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 34%, var(--bg-bottom) 100%);
    }

    .app{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:68px 16px 26px;
    }

    .board{
      width:min(596px, calc(100vw - 32px));
      align-self:center;
    }

    .top-row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:6px;
    }

    .title-wrap{min-width:0}

    .title{
      margin:0 0 8px;
      font-size:clamp(1.36rem, 2vw, 1.72rem);
      font-weight:800;
      letter-spacing:-.025em;
      line-height:1.1;
      text-align:left;
    }

    .counter{
      margin:0 0 14px;
      font-size:1rem;
      font-weight:700;
      color:var(--muted);
      line-height:1.1;
      text-align:left;
    }

    button{
      appearance:none;
      border:none;
      font:inherit;
      color:inherit;
      cursor:pointer;
    }

    .theme-toggle{
      flex:0 0 auto;
      height:36px;
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:0 11px;
      border-radius:999px;
      background:linear-gradient(180deg, var(--pair), var(--pair-bottom));
      border:1px solid var(--pair-border);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08), 0 1px 5px rgba(0,0,0,.08);
      font-size:.84rem;
      font-weight:700;
    }

    .theme-toggle::before{
      content:"";
      width:10px;
      height:10px;
      border-radius:50%;
      background:linear-gradient(180deg,#f4f7ff,#b8c2d8);
      box-shadow:0 0 0 1px rgba(255,255,255,.28), 0 1px 2px rgba(0,0,0,.18);
      flex:0 0 auto;
    }

    html[data-theme="wood"] .theme-toggle::before{
      background:linear-gradient(180deg,#f4d8b6,#a66a38);
    }

    html[data-theme="wood"] .theme-toggle,
    html[data-theme="wood"] .pair-btn,
    html[data-theme="wood"] .tile-btn,
    html[data-theme="wood"] .hand-tray{
      background-image:
        linear-gradient(180deg, rgba(255,231,203,.08), rgba(255,231,203,0) 42%),
        var(--wood-grain),
        linear-gradient(180deg, color-mix(in srgb, var(--pair) 96%, white 4%), var(--pair-bottom));
      background-blend-mode:screen, multiply, normal;
    }

    .theme-toggle:hover{transform:translateY(-1px)}

    .pair-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:8px 10px;
      margin-bottom:10px;
    }

    .pair-btn{
      height:39px;
      border-radius:10px;
      background:linear-gradient(180deg, var(--pair), var(--pair-bottom));
      border:1px solid var(--pair-border);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08), 0 1px 5px rgba(0,0,0,.08);
      transition:transform .14s ease, background .14s ease, border-color .14s ease, box-shadow .14s ease;
      display:grid;
      place-items:center;
      padding:3px;
    }

    .pair-btn:hover,.tile-btn:hover{transform:translateY(-1px)}

    .pair-btn.active{
      background:linear-gradient(180deg, #86df78, var(--green-2));
      border-color:var(--green-border);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.24), 0 0 0 2px var(--green-shadow);
    }

    .pair-btn .domino{transform:scale(.75)}

    .tiles-row{
      display:grid;
      grid-template-columns:repeat(7, minmax(0, 1fr));
      gap:8px;
      margin-bottom:14px;
    }

    .tile-btn{
      min-height:126px;
      padding:4px;
      border-radius:14px;
      background:var(--tile-frame);
      border:1px solid var(--tile-border);
      display:grid;
      place-items:center;
      transition:transform .14s ease, border-color .14s ease, box-shadow .14s ease, background .14s ease;
    }

    .tile-btn.selected{
      background:var(--tile-selected);
      border-color:var(--green-border);
      box-shadow:0 0 0 3px rgba(121,218,108,.16);
    }

    .confirm-btn{
      width:100%;
      height:48px;
      border-radius:12px;
      background:linear-gradient(180deg, #7fe171, #67cb59);
      border:1px solid var(--green-border);
      color:#fbfff8;
      font-size:1.02rem;
      font-weight:800;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.26), 0 7px 18px rgba(58,108,47,.18);
      margin-bottom:108px;
    }

    .confirm-btn:disabled{
      opacity:.58;
      cursor:not-allowed;
    }

    .hand-zone{
      width:min(506px, calc(100vw - 48px));
      margin-top:auto;
      position:relative;
    }

    .hand-zone::before{
      content:"";
      position:absolute;
      left:7%;
      right:7%;
      top:-2px;
      height:1px;
      background:rgba(255,255,255,.14);
      opacity:.55;
      border-radius:999px;
      pointer-events:none;
    }

    .hand-zone::after{
      content:"";
      position:absolute;
      left:10%;
      right:10%;
      bottom:-1px;
      height:18px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,0,0,.18) 0%, rgba(0,0,0,.1) 44%, transparent 76%);
      filter:blur(10px);
      pointer-events:none;
    }

    .hand-tray{
      min-height:90px;
      border-radius:13px;
      border:1px solid var(--tray-border);
      background:linear-gradient(180deg, color-mix(in srgb, var(--tray) 88%, white 8%), var(--tray));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06), 0 8px 22px var(--shadow);
      display:flex;
      align-items:flex-end;
      justify-content:center;
      gap:8px;
      padding:11px 14px 8px;
      overflow-x:auto;
      overflow-y:hidden;
      scrollbar-width:none;
      -ms-overflow-style:none;
    }

    .hand-tray::-webkit-scrollbar{display:none}

    .hand-empty{
      align-items:center;
      color:rgba(255,255,255,.6);
      font-size:.9rem;
    }

    .hand-tile-wrap{
      flex:0 0 auto;
      display:flex;
      justify-content:center;
      align-items:flex-end;
      transform-origin:center bottom;
      transition:transform .14s ease, filter .14s ease;
    }

    .hand-tile-wrap .domino.small{
      display:grid;
      place-items:stretch;
    }

    .domino{
      display:grid;
      grid-template-rows:1fr 1fr;
      overflow:hidden;
      border-radius:10px;
      border:1px solid var(--domino-edge);
      background:linear-gradient(180deg, var(--domino-top), var(--domino));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.62), 0 3px 8px rgba(0,0,0,.11);
    }

    .domino.large{width:64px;height:98px}
    .domino.small{width:34px;height:54px}
    .domino.pair-visual{width:40px;height:28px;grid-template-columns:1fr 1fr;grid-template-rows:none;border-radius:8px}
    .domino.pair-visual .half + .half{border-top:none;border-left:2px solid var(--domino-line)}
    .domino.pair-visual .pips{width:12px;height:12px}
    .domino.pair-visual .pip{width:2.8px;height:2.8px}

    .half{
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at 28% 22%, rgba(255,255,255,.48), transparent 26%),
        linear-gradient(180deg, #faf6ec, var(--domino));
    }

    .half + .half{border-top:2px solid var(--domino-line)}

    .pips{
      width:24px;
      height:24px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      grid-template-rows:repeat(3,1fr);
    }

    .domino.small .pips{width:16px;height:16px}

    .pip{
      width:5px;
      height:5px;
      border-radius:50%;
      background:var(--pip);
      box-shadow:0 .5px 0 rgba(255,255,255,.25) inset;
      place-self:center;
      opacity:0;
    }

    .domino.small .pip{width:3.6px;height:3.6px}
    .pip.show{opacity:1}

    @media (max-width:700px){
      .app{padding-top:54px}
      .board{width:min(560px, calc(100vw - 24px))}
      .domino.large{width:56px;height:88px}
      .tile-btn{min-height:114px}
      .confirm-btn{margin-bottom:72px}
      .hand-zone{width:min(462px, calc(100vw - 28px))}
    }

    @media (max-width:560px){
      .app{padding:36px 12px 18px}
      .board{width:100%}
      .title{font-size:1.18rem}
      .counter{font-size:.93rem;margin-bottom:12px}
      .top-row{gap:8px}
      .theme-toggle{height:34px;padding:0 10px;font-size:.78rem}
      .pair-grid{gap:7px}
      .pair-btn{height:38px}
      .tiles-row{gap:6px}
      .domino.large{width:44px;height:76px}
      .tile-btn{min-height:96px;padding:3px;border-radius:12px}
      .confirm-btn{height:46px;font-size:.97rem;margin-bottom:40px}
      .hand-zone{width:min(396px, calc(100vw - 20px))}
      .hand-tray{min-height:80px;padding:9px 10px 7px;gap:5px}
      .domino.small{width:28px;height:44px}
      .domino.pair-visual{width:34px;height:24px}
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="board">
      <div class="top-row">
        <div class="title-wrap">
          <h1 class="title">Selecciona exactamente 7 fichas</h1>
          <p id="counter" class="counter">Hand ready to build</p>
        </div>
        <button id="themeToggle" class="theme-toggle" type="button" aria-label="Switch page style">🌗 Estilo</button>
      </div>
      <div id="pairGrid" class="pair-grid"></div>
      <div id="tilesRow" class="tiles-row"></div>
      <button id="confirmBtn" class="confirm-btn" type="button">✓ Confirmar mano</button>
    </section>

    <section class="hand-zone" aria-label="Selected domino hand">
      <div id="handTray" class="hand-tray hand-empty">Selecciona fichas para formar tu mano</div>
    </section>
  </main>

  <script>
    const PIP_MAP={0:[],1:[4],2:[0,8],3:[0,4,8],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]};
    const values=Array.from({length:7},(_,i)=>i);
    const themes=['midnight','wood'];
    const savedTheme=localStorage.getItem('domino-theme');
    const state={
      activePair:3,
      selected:[[1,4],[2,3],[1,2],[3,6],[4,6],[2,5],[3,5]],
      theme:themes.includes(savedTheme)?savedTheme:'midnight'
    };

    const root=document.documentElement;
    const pairGrid=document.getElementById('pairGrid');
    const tilesRow=document.getElementById('tilesRow');
    const counter=document.getElementById('counter');
    const confirmBtn=document.getElementById('confirmBtn');
    const handTray=document.getElementById('handTray');
    const themeToggle=document.getElementById('themeToggle');

    const key=tile=>`${tile[0]}-${tile[1]}`;
    const normalize=(a,b)=>a<=b?[a,b]:[b,a];
    const tilesForPair=n=>values.map(v=>normalize(n,v));

    function setTheme(theme){
      state.theme=theme;
      root.dataset.theme=theme;
      localStorage.setItem('domino-theme', theme);
      themeToggle.textContent=theme==='wood'?'🪵 Madera':'🌙 Noche';
    }

    function pips(n){
      const visible=new Set(PIP_MAP[n]);
      return `<div class="pips">${Array.from({length:9},(_,i)=>`<span class="pip ${visible.has(i)?'show':''}"></span>`).join('')}</div>`;
    }

    function domino(a,b,size='large',orientation='vertical'){
      return `<div class="domino ${size} ${orientation==='horizontal'?'pair-visual':''}"><div class="half">${pips(a)}</div><div class="half">${pips(b)}</div></div>`;
    }

    function renderPairs(){
      pairGrid.innerHTML=values.map(n=>`
        <button class="pair-btn ${state.activePair===n?'active':''}" type="button" data-pair="${n}" aria-label="Par ${n}-${n}">
          ${domino(n,n,'pair-visual','horizontal')}
        </button>
      `).join('');

      pairGrid.querySelectorAll('.pair-btn').forEach(btn=>{
        btn.onclick=()=>{
          state.activePair=Number(btn.dataset.pair);
          render();
        };
      });
    }

    function renderTiles(){
      const selectedKeys=new Set(state.selected.map(key));
      tilesRow.innerHTML=tilesForPair(state.activePair).map(tile=>{
        const tileKey=key(tile);
        return `
          <button class="tile-btn ${selectedKeys.has(tileKey)?'selected':''}" type="button" data-tile="${tileKey}" aria-label="Ficha ${tileKey}">
            ${domino(tile[0],tile[1],'large')}
          </button>
        `;
      }).join('');

      tilesRow.querySelectorAll('.tile-btn').forEach(btn=>{
        btn.onclick=()=>{
          const tile=btn.dataset.tile.split('-').map(Number);
          const tileKey=key(tile);
          const existingIndex=state.selected.findIndex(item=>key(item)===tileKey);

          if(existingIndex>=0){
            state.selected.splice(existingIndex,1);
          }else if(state.selected.length<7){
            state.selected.push(tile);
          }

          render();
        };
      });
    }

    function renderCounter(){
      counter.textContent=state.selected.length===7?'Hand complete':'Hand ready to build';
      confirmBtn.disabled=state.selected.length!==7;
    }

    function renderHand(){
      if(!state.selected.length){
        handTray.className='hand-tray hand-empty';
        handTray.textContent='Selecciona fichas para formar tu mano';
        return;
      }

      handTray.className='hand-tray';
      handTray.innerHTML=state.selected.map(tile=>`
        <div class="hand-tile-wrap">
          ${domino(tile[0],tile[1],'small')}
        </div>
      `).join('');
    }

    function render(){
      renderPairs();
      renderTiles();
      renderCounter();
      renderHand();
    }

    themeToggle.addEventListener('click',()=>{
      setTheme(state.theme==='midnight'?'wood':'midnight');
    });

    confirmBtn.addEventListener('click',()=>{
      if(state.selected.length===7){
        confirmBtn.textContent='✓ Mano confirmada';
      }
    });

    setTheme(state.theme);
    render();
  </script>
</body>
</html>
