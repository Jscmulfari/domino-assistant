<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Domino Assistant</title>
  <style>
    :root{
      --bg:#0b1220;
      --bg-glow:rgba(96,165,250,.14);
      --surface:#10192b;
      --surface-soft:#172338;
      --surface-strong:#1d2b43;
      --surface-raised:#22314d;
      --border:rgba(148,163,184,.16);
      --border-strong:rgba(96,165,250,.38);
      --text:#eef4ff;
      --muted:#97a6bf;
      --muted-strong:#c4d0e2;
      --accent:#60a5fa;
      --accent-soft:rgba(96,165,250,.12);
      --success:#22c55e;
      --success-soft:rgba(34,197,94,.12);
      --success-ring:rgba(34,197,94,.2);
      --shadow-lg:0 20px 44px rgba(2,6,23,.3);
      --shadow-md:0 14px 32px rgba(2,6,23,.24);
      --radius-xl:28px;
      --radius-lg:24px;
      --radius-md:18px;
      --radius-sm:14px;
    }

    *{box-sizing:border-box}
    html{color-scheme:dark}

    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at top, var(--bg-glow), transparent 34%),
        linear-gradient(180deg,#0b1220 0%,#0f172a 100%);
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    .app{
      width:min(860px,100%);
      margin:0 auto;
      padding:38px 20px 30px;
    }

    .screen{
      display:grid;
      gap:22px;
    }

    .topbar{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:18px;
      padding:4px 6px 0;
    }

    .title-block{
      display:grid;
      gap:8px;
    }

    h1{
      margin:0;
      font-size:clamp(1.8rem,4vw,2.3rem);
      line-height:1;
      letter-spacing:-.055em;
    }

    .subtitle{
      color:var(--muted);
      font-size:.96rem;
      line-height:1.4;
    }

    .counter{
      padding:12px 16px;
      border-radius:999px;
      background:linear-gradient(180deg,rgba(23,35,56,.92),rgba(16,25,43,.98));
      border:1px solid var(--border);
      box-shadow:var(--shadow-md);
      color:var(--muted-strong);
      font-size:.92rem;
      font-weight:800;
      white-space:nowrap;
      align-self:center;
    }

    .stack{
      display:grid;
      gap:18px;
      padding:22px;
      border-radius:var(--radius-xl);
      background:linear-gradient(180deg,rgba(17,25,41,.88),rgba(12,19,31,.94));
      border:1px solid rgba(148,163,184,.1);
      box-shadow:var(--shadow-lg);
      backdrop-filter:blur(8px);
    }

    .group{
      display:grid;
      gap:12px;
    }

    .group-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:0 2px;
    }

    .group-title{
      font-size:.8rem;
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .group-note{
      font-size:.84rem;
      color:var(--muted);
    }

    .pair-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
    }

    .pair-btn,
    .tile-btn,
    .confirm-btn{
      appearance:none;
      border:none;
      font:inherit;
      color:inherit;
      cursor:pointer;
    }

    .pair-btn,
    .tile-btn,
    .confirm-btn,
    .mini-tile{
      position:relative;
      overflow:hidden;
    }

    .pair-btn::before,
    .tile-btn::before,
    .mini-tile::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,rgba(255,255,255,.06),transparent 42%);
      pointer-events:none;
    }

    .pair-btn{
      display:grid;
      place-items:center;
      gap:10px;
      padding:16px 12px 14px;
      border-radius:20px;
      background:linear-gradient(180deg,rgba(24,34,53,.94),rgba(16,25,43,.98));
      border:1px solid var(--border);
      box-shadow:var(--shadow-md);
      transition:border-color .18s ease, transform .18s ease, background .18s ease, box-shadow .18s ease;
    }

    .pair-btn:hover,.tile-btn:hover,.confirm-btn:hover{transform:translateY(-1px)}

    .pair-btn.active{
      background:linear-gradient(180deg,rgba(34,49,77,.96),rgba(24,38,61,.98));
      border-color:var(--border-strong);
      box-shadow:0 0 0 1px rgba(96,165,250,.16), 0 18px 36px rgba(2,6,23,.3);
    }

    .pair-label{
      font-size:.78rem;
      font-weight:800;
      letter-spacing:.1em;
      text-transform:uppercase;
      color:var(--muted-strong);
    }

    .tile-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:16px;
    }

    .tile-btn{
      display:grid;
      gap:10px;
      justify-items:center;
      align-content:center;
      padding:18px 14px;
      min-height:186px;
      border-radius:24px;
      background:linear-gradient(180deg,rgba(24,34,53,.94),rgba(16,25,43,.98));
      border:1px solid var(--border);
      box-shadow:var(--shadow-lg);
      transition:border-color .18s ease, transform .18s ease, background .18s ease, box-shadow .18s ease;
    }

    .tile-btn.sel{
      background:linear-gradient(180deg,rgba(34,197,94,.1),rgba(20,31,49,.98));
      border-color:rgba(34,197,94,.48);
      box-shadow:0 0 0 1px var(--success-ring), 0 20px 40px rgba(2,6,23,.3);
    }

    .tile-name{
      display:none;
    }

    .confirm-btn{
      width:100%;
      justify-content:center;
      align-items:center;
      padding:15px 18px;
      border-radius:20px;
      background:linear-gradient(180deg,#3b82f6,#2563eb);
      border:1px solid rgba(96,165,250,.42);
      color:white;
      font-weight:800;
      letter-spacing:-.01em;
      box-shadow:0 18px 34px rgba(37,99,235,.22);
      display:none;
      transition:transform .16s ease, box-shadow .16s ease, filter .16s ease;
    }

    .confirm-btn:hover{box-shadow:0 20px 40px rgba(37,99,235,.26);filter:brightness(1.03)}
    .confirm-btn.show{display:inline-flex}

    .tray-shell{
      display:grid;
      gap:12px;
    }

    .tray{
      display:flex;
      align-items:center;
      gap:12px;
      overflow-x:auto;
      padding:14px;
      min-height:92px;
      border-radius:24px;
      background:linear-gradient(180deg,rgba(20,30,48,.94),rgba(14,22,37,.98));
      border:1px solid var(--border);
      box-shadow:var(--shadow-md);
      scrollbar-width:thin;
      scrollbar-color:rgba(151,166,191,.45) transparent;
    }

    .tray::-webkit-scrollbar{height:8px}
    .tray::-webkit-scrollbar-thumb{background:rgba(151,166,191,.35);border-radius:999px}

    .tray.empty{
      color:var(--muted);
      font-size:.92rem;
      justify-content:center;
      border-style:dashed;
      background:linear-gradient(180deg,rgba(19,28,44,.72),rgba(12,19,31,.9));
    }

    .mini-tile{
      flex:0 0 auto;
      width:60px;
      padding:7px;
      border-radius:16px;
      background:linear-gradient(180deg,rgba(29,43,67,.98),rgba(20,31,49,.96));
      border:1px solid rgba(148,163,184,.14);
      box-shadow:0 10px 20px rgba(2,6,23,.2);
      transition:transform .2s ease, opacity .2s ease;
    }

    .mini-tile.enter{
      animation:tileIn .24s ease both;
    }

    .mini-tile.exit{
      animation:tileOut .2s ease both;
      pointer-events:none;
    }

    @keyframes tileIn{
      from{opacity:0;transform:translateY(8px) scale(.96)}
      to{opacity:1;transform:translateY(0) scale(1)}
    }

    @keyframes tileOut{
      from{opacity:1;transform:translateY(0) scale(1)}
      to{opacity:0;transform:translateY(-6px) scale(.96)}
    }

    .domino{width:100%;display:grid;grid-template-rows:1fr 1fr;border-radius:14px;overflow:hidden;background:#e5edf8;border:1px solid rgba(15,23,42,.46)}
    .domino.large{max-width:74px;height:108px}
    .domino.medium{max-width:56px;height:82px}
    .domino.small{height:62px}
    .half{position:relative;display:grid;place-items:center;background:#f8fafc}
    .half::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.28),transparent 40%);pointer-events:none}
    .half + .half{border-top:2px solid #0f172a}
    .pips{width:28px;height:28px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr)}
    .pip{width:6px;height:6px;border-radius:999px;background:#0f172a;place-self:center;opacity:0}
    .pip.show{opacity:1}

    @media (max-width:640px){
      .app{padding:24px 12px 18px}
      .screen{gap:16px}
      .topbar{align-items:flex-start;padding-inline:2px}
      .stack{padding:16px;gap:16px;border-radius:24px}
      .pair-grid,.tile-grid{grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
      .pair-btn{padding:12px 8px 11px;border-radius:17px;gap:8px}
      .tile-btn{padding:12px 8px;min-height:164px;border-radius:20px;gap:8px}
      .domino.large{max-width:64px;height:94px}
      .domino.medium{max-width:48px;height:70px}
      .domino.small{height:56px}
      .pips{width:24px;height:24px}
      .pair-label{font-size:.72rem}
      .tray{padding:10px;min-height:80px;border-radius:18px;gap:10px}
      .mini-tile{width:54px;padding:6px;border-radius:14px}
      .counter{padding:10px 13px;font-size:.88rem}
      .confirm-btn{border-radius:18px}
      .subtitle{font-size:.9rem}
      .group-head{align-items:flex-start;flex-direction:column}
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="screen">
      <div class="topbar">
        <div class="title-block">
          <h1>Domino Assistant</h1>
          <div class="subtitle">Build your hand with a calmer, clearer selection flow.</div>
        </div>
        <div id="counter" class="counter">0 / 7</div>
      </div>

      <div class="stack">
        <section class="group">
          <div class="group-head">
            <div class="group-title">Double selector</div>
            <div class="group-note">Choose the base pair first.</div>
          </div>
          <div id="pairGrid" class="pair-grid"></div>
        </section>

        <section class="group">
          <div class="group-head">
            <div class="group-title">Available tiles</div>
            <div class="group-note">Select up to seven tiles for your hand.</div>
          </div>
          <div id="tileGrid" class="tile-grid"></div>
        </section>

        <button id="confirmBtn" class="confirm-btn">Confirmar mano</button>

        <section class="tray-shell">
          <div class="group-head">
            <div class="group-title">Selected tiles</div>
            <div class="group-note">Your current hand appears here.</div>
          </div>
          <div id="tray" class="tray empty">No tiles selected</div>
        </section>
      </div>
    </section>
  </main>

  <script>
    const PIP_MAP={0:[],1:[4],2:[0,8],3:[0,4,8],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]};
    const values=Array.from({length:7},(_,i)=>i);
    const state={activePair:3,selected:[]};

    const pairGrid=document.getElementById('pairGrid');
    const tileGrid=document.getElementById('tileGrid');
    const counter=document.getElementById('counter');
    const confirmBtn=document.getElementById('confirmBtn');
    const tray=document.getElementById('tray');

    const key=t=>`${t[0]}-${t[1]}`;
    const normalize=(a,b)=>a<=b?[a,b]:[b,a];
    const tilesForPair=n=>values.map(v=>normalize(n,v));

    function pips(n){
      const visible=new Set(PIP_MAP[n]);
      return `<div class="pips">${Array.from({length:9},(_,i)=>`<span class="pip ${visible.has(i)?'show':''}"></span>`).join('')}</div>`;
    }

    function domino(a,b,size='medium'){
      return `<div class="domino ${size}"><div class="half">${pips(a)}</div><div class="half">${pips(b)}</div></div>`;
    }

    function renderPairs(){
      pairGrid.innerHTML=values.map(n=>`
        <button class="pair-btn ${state.activePair===n?'active':''}" data-pair="${n}" aria-label="Double ${n}">
          ${domino(n,n,'medium')}
          <div class="pair-label">Double</div>
        </button>
      `).join('');

      pairGrid.querySelectorAll('.pair-btn').forEach(btn=>{
        btn.onclick=()=>{
          state.activePair=Number(btn.dataset.pair);
          render();
        };
      });
    }

    function renderTiles(){
      const selectedKeys=new Set(state.selected.map(key));
      tileGrid.innerHTML=tilesForPair(state.activePair).map(tile=>{
        const tileKey=key(tile);
        return `
          <button class="tile-btn ${selectedKeys.has(tileKey)?'sel':''}" data-tile="${tileKey}" aria-label="Tile ${tileKey}">
            ${domino(tile[0],tile[1],'large')}
            <div class="tile-name">${tileKey}</div>
          </button>
        `;
      }).join('');

      tileGrid.querySelectorAll('.tile-btn').forEach(btn=>{
        btn.onclick=()=>{
          const tile=btn.dataset.tile.split('-').map(Number);
          const tileKey=key(tile);
          const currentIndex=state.selected.findIndex(item=>key(item)===tileKey);

          if(currentIndex>=0){
            state.selected.splice(currentIndex,1);
          }else if(state.selected.length<7){
            state.selected.push(tile);
          }

          render();
        };
      });
    }

    function renderCounter(){
      counter.textContent=`${state.selected.length} / 7`;
      confirmBtn.classList.toggle('show', state.selected.length===7);
    }

    function buildMiniTile(tile,extraClass=''){
      return `<div class="mini-tile ${extraClass}" data-key="${key(tile)}">${domino(tile[0],tile[1],'small')}</div>`;
    }

    function renderTray(){
      const nextKeys=state.selected.map(key);
      const previousItems=[...tray.querySelectorAll('.mini-tile')];
      const previousKeys=new Set(previousItems.map(item=>item.dataset.key));
      const leavingMarkup=previousItems
        .filter(item=>!nextKeys.includes(item.dataset.key))
        .map(item=>item.outerHTML.replace('mini-tile','mini-tile exit'))
        .join('');

      if(!state.selected.length){
        if(previousItems.length){
          tray.className='tray';
          tray.innerHTML=leavingMarkup;
          setTimeout(()=>{
            if(state.selected.length===0){
              tray.className='tray empty';
              tray.textContent='No tiles selected';
            }
          },200);
        }else{
          tray.className='tray empty';
          tray.textContent='No tiles selected';
        }
        return;
      }

      tray.className='tray';

      const persistentMarkup=state.selected
        .filter(tile=>previousKeys.has(key(tile)))
        .map(tile=>buildMiniTile(tile))
        .join('');

      const enteringMarkup=state.selected
        .filter(tile=>!previousKeys.has(key(tile)))
        .map(tile=>buildMiniTile(tile,'enter'))
        .join('');

      tray.innerHTML=persistentMarkup+enteringMarkup+leavingMarkup;

      setTimeout(()=>{
        tray.querySelectorAll('.mini-tile.exit').forEach(item=>item.remove());
      },200);
    }

    function render(){
      renderPairs();
      renderTiles();
      renderCounter();
      renderTray();
    }

    render();
  </script>
</body>
</html>
