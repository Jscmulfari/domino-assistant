<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Domino Assistant R3F</title>
  <style>
    :root{--bg:#0f172a;--text:#e5e7eb;--cardTop:#111827;--cardBottom:#0b1220;--cardBorder:#334155;--tileTop:#243247;--tileBottom:#0f172a;--tileBorder:#52627a;--selTop:#1a4a32;--selBottom:#113122;--selBorder:#22c55e;--half:#f8fafc;--pip:#0f172a;--muted:#94a3b8;}
    body[data-style="minimal"]{--bg:#0b1220;--text:#e2e8f0;--cardTop:#0f172a;--cardBottom:#0f172a;--cardBorder:#334155;--tileTop:#1f2937;--tileBottom:#111827;--tileBorder:#4b5563;--selTop:#1f3a2b;--selBottom:#152a20;--selBorder:#34d399;--half:#ffffff;--pip:#111827;--muted:#9ca3af;}
    body[data-style="gaming"]{--bg:#070b1a;--text:#f5f3ff;--cardTop:#120f2a;--cardBottom:#0a1020;--cardBorder:#4c1d95;--tileTop:#20103f;--tileBottom:#0f122a;--tileBorder:#7c3aed;--selTop:#0f5132;--selBottom:#043b2d;--selBorder:#22d3ee;--half:#f5f3ff;--pip:#1f1147;--muted:#c4b5fd;}
    body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
    .app{max-width:760px;margin:0 auto;padding:10px}
    .card{background:linear-gradient(180deg,var(--cardTop),var(--cardBottom));border:1px solid var(--cardBorder);border-radius:14px;padding:12px;margin-bottom:10px;box-shadow:0 8px 24px rgba(0,0,0,.25)}
    h1{font-size:1.05rem;margin:0 0 6px;letter-spacing:.01em}
    .muted{color:var(--muted);font-size:.88rem}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(54px,1fr));gap:4px;margin-top:6px}
    .tile-btn{border:1px solid var(--tileBorder);background:linear-gradient(180deg,var(--tileTop),var(--tileBottom));border-radius:10px;padding:4px 3px;min-height:90px;transition:.12s ease;box-shadow:inset 0 1px 0 #ffffff1a,0 4px 10px #00000030}
    .tile-btn.sel{border-color:var(--selBorder);background:linear-gradient(180deg,var(--selTop),var(--selBottom));box-shadow:0 0 0 2px color-mix(in srgb, var(--selBorder) 35%, transparent),inset 0 1px 0 #ffffff18}
    .tile-btn:active{transform:scale(.98)}
    .domino-face{display:grid;grid-template-rows:1fr 1fr;gap:0;align-items:stretch}
    .half{min-height:38px;border-radius:0;background:var(--half);position:relative;display:grid;place-items:center}
    .domino-face .half:first-child{border-top-left-radius:6px;border-top-right-radius:6px}
    .domino-face .half.right{border-top:2px solid var(--pip);border-bottom-left-radius:6px;border-bottom-right-radius:6px}
    .pips{width:22px;height:22px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr)}
    .pip{width:5px;height:5px;border-radius:99px;background:var(--pip);place-self:center;opacity:0}
    .show{opacity:1}
    .selected-strip{display:flex;gap:8px;overflow:auto;padding-top:6px}
    .selected-strip .domino-face{min-width:72px}
    #r3fWrap{height:180px;border:1px solid #374151;border-radius:10px;overflow:hidden;margin-top:8px;background:#0b1220}
    .cta{margin-top:10px;display:none;border:1px solid #22c55e;background:#14532d;color:#dcfce7;border-radius:10px;padding:10px 12px;font-weight:700;width:100%}
    .cta.show{display:block}
    @media (max-width:520px){ .grid{grid-template-columns:repeat(4,minmax(0,1fr));gap:4px} .tile-btn{min-height:84px;padding:4px 3px} }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap">
        <h1>Selecciona exactamente 7 fichas</h1>
        <select id="stylePicker" style="border:1px solid var(--cardBorder);background:var(--tileBottom);color:var(--text);border-radius:8px;padding:6px">
          <option value="realista">Realista premium</option>
          <option value="minimal">Minimal clean</option>
          <option value="gaming">Gaming neon</option>
        </select>
      </div>
      <div id="counter" class="muted">Seleccionadas: 0/7</div>
      <div id="grid" class="grid"></div>
      <button id="confirmCta" class="cta">✓ Confirmar mano</button>
    </div>

    <div class="card">
      <h1>Vista de mano seleccionada</h1>
      <div id="fallback2d" class="selected-strip"></div>
      <div id="r3fWrap"></div>
      <div id="renderNote" class="muted" style="margin-top:6px">R3F activo si WebGL está disponible; fallback 2D incluido.</div>
    </div>
  </div>

  <script>
    const PIP_MAP={
      0:[],1:[4],2:[0,8],3:[0,4,8],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]
    };
    const allTiles=[]; for(let a=0;a<=6;a++) for(let b=a;b<=6;b++) allTiles.push([a,b]);
    const key=t=>`${t[0]}-${t[1]}`;
    const state={selected:[]};

    const STYLE_KEY='domino_style_v1';
    const grid=document.getElementById('grid');
    const counter=document.getElementById('counter');
    const cta=document.getElementById('confirmCta');
    const fallback2d=document.getElementById('fallback2d');
    const stylePicker=document.getElementById('stylePicker');

    function pips(n){
      const visible=new Set(PIP_MAP[n]);
      return `<div class="pips">${Array.from({length:9},(_,i)=>`<span class="pip ${visible.has(i)?'show':''}"></span>`).join('')}</div>`;
    }
    function face(a,b){
      return `<div class="domino-face"><div class="half">${pips(a)}</div><div class="half right">${pips(b)}</div></div>`;
    }
    function render(){
      const set=new Set(state.selected.map(key));
      grid.innerHTML=allTiles.map(t=>`<button class="tile-btn ${set.has(key(t))?'sel':''}" data-t="${key(t)}">${face(t[0],t[1])}</button>`).join('');
      [...grid.querySelectorAll('.tile-btn')].forEach(btn=>btn.onclick=()=>{
        const t=btn.dataset.t.split('-').map(Number); const k=key(t);
        const idx=state.selected.findIndex(x=>key(x)===k);
        if(idx>=0) state.selected.splice(idx,1); else if(state.selected.length<7) state.selected.push(t);
        render(); renderFallback(); renderR3F();
      });
      counter.textContent=`Seleccionadas: ${state.selected.length}/7`;
      cta.classList.toggle('show', state.selected.length===7);
    }
    function renderFallback(){
      fallback2d.innerHTML = state.selected.map(t=>face(t[0],t[1])).join('') || '<span class="muted">Sin fichas seleccionadas.</span>';
    }

    function hasWebGL(){
      try{ const c=document.createElement('canvas'); return !!(c.getContext('webgl')||c.getContext('experimental-webgl')); }catch{return false;}
    }

    function applyStyle(style){
      const val = ['realista','minimal','gaming'].includes(style) ? style : 'realista';
      document.body.setAttribute('data-style', val==='realista' ? '' : val);
      stylePicker.value = val;
      localStorage.setItem(STYLE_KEY, val);
    }
    stylePicker.addEventListener('change', (e)=>applyStyle(e.target.value));

    window.__dominoSelected = () => state.selected;
    applyStyle(localStorage.getItem(STYLE_KEY) || 'realista');
    render(); renderFallback();
  </script>

  <script type="module">
    const wrap=document.getElementById('r3fWrap');
    const note=document.getElementById('renderNote');
    const canWebGL = (()=>{try{const c=document.createElement('canvas'); return !!(c.getContext('webgl')||c.getContext('experimental-webgl'));}catch{return false;}})();
    if(!canWebGL){ wrap.style.display='none'; note.textContent='WebGL no disponible: usando fallback 2D.'; }
    else {
      const React = await import('https://esm.sh/react@18');
      const ReactDOM = await import('https://esm.sh/react-dom@18/client');
      const Fiber = await import('https://esm.sh/@react-three/fiber@8.17.10?deps=react@18,react-dom@18,three@0.160.0');
      const Drei = await import('https://esm.sh/@react-three/drei@9.105.6?deps=@react-three/fiber@8.17.10,react@18,react-dom@18,three@0.160.0');

      function TileMesh({x}){
        return React.createElement('mesh',{position:[x,0,0]},[
          React.createElement('boxGeometry',{args:[0.7,1.05,0.08],key:'g'}),
          React.createElement('meshStandardMaterial',{color:'#f3f4f6',key:'m'})
        ]);
      }
      function Scene(){
        const selected = (window.__dominoSelected?.() || []).slice(0,7);
        return React.createElement(React.Fragment,null,
          React.createElement('ambientLight',{intensity:0.9}),
          React.createElement('directionalLight',{position:[2,3,2],intensity:1}),
          selected.map((_,i)=>React.createElement(TileMesh,{x:(i-3)*0.8,key:i})),
          React.createElement(Drei.OrbitControls,{enablePan:false,enableZoom:false,minPolarAngle:1.2,maxPolarAngle:1.9})
        );
      }

      const root = ReactDOM.createRoot(wrap);
      function renderR3F(){
        root.render(React.createElement(Fiber.Canvas,{camera:{position:[0,1.2,4]}},React.createElement(Scene)));
      }
      window.renderR3F = renderR3F;
      renderR3F();
      setInterval(renderR3F,500);
    }
  </script>
</body>
</html>
