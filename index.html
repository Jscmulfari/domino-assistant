<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Domino Selector</title>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#0f172a;color:#e2e8f0}
    .app{max-width:680px;margin:0 auto;padding:12px}
    .title{font-size:1.15rem;font-weight:800;margin-bottom:6px}
    .counter{font-size:1rem;font-weight:700;margin-bottom:10px;color:#93c5fd}
    .pairs{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
    .pair-btn{border:1px solid #475569;background:#1e293b;color:#fff;border-radius:10px;padding:10px;font-weight:700}
    .pair-btn.active{border-color:#22c55e;background:#14532d}
    .options{margin-top:10px;display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px}
    .tile{border:1px solid #475569;background:#1e293b;border-radius:12px;padding:6px;min-height:104px;cursor:pointer;transition:.1s}
    .tile.sel{border-color:#22c55e;background:#14532d;box-shadow:0 0 0 2px #22c55e55}
    .tile:active{transform:scale(.98)}
    .domino{height:100%;display:grid;grid-template-rows:1fr 1fr;gap:0}
    .half{display:grid;place-items:center;background:#f8fafc}
    .half.top{border-top-left-radius:8px;border-top-right-radius:8px}
    .half.bottom{border-top:2px solid #0f172a;border-bottom-left-radius:8px;border-bottom-right-radius:8px}
    .pips{width:26px;height:26px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr)}
    .pip{width:6px;height:6px;border-radius:99px;background:#0f172a;opacity:0;place-self:center}
    .pip.show{opacity:1}
    .cta{margin-top:12px;width:100%;padding:12px;border-radius:10px;border:1px solid #22c55e;background:#14532d;color:#dcfce7;font-weight:800;font-size:1rem;display:none}
    .cta.show{display:block}
    .selected-bar{position:fixed;left:0;right:0;bottom:calc(env(safe-area-inset-bottom,0px) + 46px);z-index:30;background:#0b1220;border:1px solid #334155;border-left:0;border-right:0;padding:7px 10px}
    .selected-strip{display:flex;gap:6px;overflow:auto}
    .mini-tile{min-width:44px;height:64px;border:1px solid #475569;background:#1e293b;border-radius:9px;padding:3px;display:grid}
    .mini-tile .domino{height:100%}
    .mini-tile.empty{display:grid;place-items:center;color:#94a3b8;font-size:.82rem;min-width:120px}
    .app{padding-bottom:128px}
    @media (max-width:520px){.pairs{grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}.options{grid-template-columns:repeat(7,minmax(0,1fr));gap:4px}.tile{min-height:88px;padding:4px}}
  </style>
</head>
<body>
  <main class="app">
    <div class="title">Selecciona exactamente 7 fichas</div>
    <div id="counter" class="counter">0 / 7 seleccionadas</div>

    <div id="pairs" class="pairs"></div>
    <div id="options" class="options"></div>

    <button id="confirm" class="cta">✓ Confirmar mano</button>
  </main>
  <section class="selected-bar">
    <div id="selectedBar" class="selected-strip"><span class="mini-tile empty">Sin selección</span></div>
  </section>

  <script>
    const P={0:[],1:[4],2:[0,8],3:[0,4,8],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]};
    const norm=t=>[Math.min(t[0],t[1]),Math.max(t[0],t[1])];
    const key=t=>{const n=norm(t);return `${n[0]}-${n[1]}`};
    const state={selected:[],activePair:0};
    const pairs=document.getElementById('pairs');
    const options=document.getElementById('options');
    const counter=document.getElementById('counter');
    const confirm=document.getElementById('confirm');
    const selectedBar=document.getElementById('selectedBar');

    function pips(n){const v=new Set(P[n]);return `<div class="pips">${Array.from({length:9},(_,i)=>`<span class="pip ${v.has(i)?'show':''}"></span>`).join('')}</div>`}
    function face(a,b){return `<div class="domino"><div class="half top">${pips(a)}</div><div class="half bottom">${pips(b)}</div></div>`}

    function pairOptions(a){const arr=[];for(let b=0;b<=6;b++)arr.push([a,b]);return arr;}

    function render(){
      pairs.innerHTML = Array.from({length:7},(_,a)=>`<button class="pair-btn ${state.activePair===a?'active':''}" data-a="${a}">${a}-${a}</button>`).join('');
      [...pairs.querySelectorAll('.pair-btn')].forEach(btn=>btn.onclick=()=>{state.activePair=Number(btn.dataset.a);render();});

      const set=new Set(state.selected.map(key));
      options.innerHTML = pairOptions(state.activePair).map(t=>`<button class="tile ${set.has(key(t))?'sel':''}" data-k="${key(t)}">${face(t[0],t[1])}</button>`).join('');
      [...options.querySelectorAll('.tile')].forEach(btn=>btn.onclick=()=>{
        const t=btn.dataset.k.split('-').map(Number); const k=key(t); const i=state.selected.findIndex(x=>key(x)===k);
        if(i>=0) state.selected.splice(i,1); else if(state.selected.length<7) state.selected.push(t);
        render();
      });

      counter.textContent=`${state.selected.length} / 7 seleccionadas`;
      confirm.classList.toggle('show', state.selected.length===7);
      selectedBar.innerHTML = state.selected.length
        ? state.selected.map((t)=>`<span class="mini-tile">${face(t[0],t[1])}</span>`).join('')
        : '<span class="mini-tile empty">Sin selección</span>';
    }

    render();
  </script>
</body>
</html>
