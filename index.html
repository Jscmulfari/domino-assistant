<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Domino Assistant - Captura de 7 fichas</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#0f172a;color:#e5e7eb;margin:0}
    .app{max-width:720px;margin:0 auto;padding:14px}
    .card{background:#111827;border:1px solid #374151;border-radius:12px;padding:12px;margin-bottom:10px}
    h1{font-size:1.1rem;margin:0 0 6px}
    .muted{color:#9ca3af;font-size:.9rem}
    .tile-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:10px}
    .tile-btn{padding:10px 0;border-radius:10px;border:1px solid #4b5563;background:#1f2937;color:#fff;font-weight:600}
    .tile-btn.sel{background:#14532d;border-color:#22c55e}
    .tile{display:inline-flex;align-items:center;justify-content:center;padding:6px 10px;background:#1f2937;border:1px solid #4b5563;border-radius:999px;margin:4px 4px 0 0}
    button.save{margin-top:10px;border-radius:10px;border:1px solid #2563eb;background:#2563eb;color:#fff;padding:9px 12px;font-weight:700}
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <h1>Selecciona exactamente 7 fichas</h1>
      <div class="muted">Doble-seis completo (0-0 a 6-6)</div>
      <div id="counter" class="muted" style="margin-top:6px">Seleccionadas: 0/7</div>
      <div id="grid" class="tile-grid"></div>
    </div>

    <div class="card">
      <h1>Tus fichas (orden de selección)</h1>
      <div id="selected" class="muted">Sin fichas seleccionadas.</div>
      <button id="save" class="save">Guardar mano</button>
      <div id="saved" class="muted" style="margin-top:8px"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'domino_saved_hand_v1';
    const state = { selected: [] };

    const allTiles = [];
    for (let a = 0; a <= 6; a++) for (let b = a; b <= 6; b++) allTiles.push([a, b]);

    const key = (t) => `${t[0]}-${t[1]}`;
    const parse = (s) => { const m = String(s).match(/^(\d)-(\d)$/); return m ? [Number(m[1]), Number(m[2])] : null; };

    const grid = document.getElementById('grid');
    const counter = document.getElementById('counter');
    const selected = document.getElementById('selected');
    const saved = document.getElementById('saved');

    function renderGrid(){
      const set = new Set(state.selected.map(key));
      grid.innerHTML = allTiles.map((t) => `<button class="tile-btn ${set.has(key(t)) ? 'sel' : ''}" data-t="${key(t)}">${key(t)}</button>`).join('');
      [...grid.querySelectorAll('button')].forEach((btn) => {
        btn.onclick = () => {
          const t = parse(btn.dataset.t); const k = key(t);
          const idx = state.selected.findIndex(x => key(x) === k);
          if (idx >= 0) state.selected.splice(idx, 1);
          else if (state.selected.length < 7) state.selected.push(t);
          render();
        };
      });
    }

    function renderSelected(){
      counter.textContent = `Seleccionadas: ${state.selected.length}/7`;
      if (!state.selected.length) { selected.textContent = 'Sin fichas seleccionadas.'; return; }
      selected.innerHTML = state.selected.map((t, i) => `<span class="tile">Ficha ${i + 1}: ${key(t)}</span>`).join('');
    }

    function renderSaved(){
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) { saved.textContent = 'Aún no hay mano guardada.'; return; }
      try {
        const arr = JSON.parse(raw);
        saved.textContent = `Guardada: ${arr.join(', ')}`;
      } catch {
        saved.textContent = 'No se pudo leer la mano guardada.';
      }
    }

    function render(){ renderGrid(); renderSelected(); renderSaved(); }

    document.getElementById('save').onclick = () => {
      if (state.selected.length !== 7) {
        saved.textContent = 'Debes seleccionar exactamente 7 fichas antes de guardar.';
        return;
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.selected.map(key)));
      renderSaved();
    };

    const existing = localStorage.getItem(STORAGE_KEY);
    if (existing) {
      try {
        const arr = JSON.parse(existing).map(parse).filter(Boolean).slice(0,7);
        state.selected = arr;
      } catch {}
    }

    render();
  </script>
</body>
</html>
