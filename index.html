<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Domino Assistant</title>
  <style>
    :root{
      --bg-top:#182338;
      --bg-mid:#121b2d;
      --bg-bottom:#0d1524;
      --text:#f3f6fb;
      --muted:#a4b0c3;
      --soft:#d4dceb;
      --panel:#182235;
      --panel-2:#131c2d;
      --panel-border:rgba(181,197,224,.12);
      --panel-highlight:rgba(255,255,255,.03);
      --pair:#25324a;
      --pair-bottom:#1f2a40;
      --pair-border:rgba(191,207,236,.14);
      --green:#78d86d;
      --green-2:#63c85a;
      --green-border:rgba(191,244,183,.72);
      --green-shadow:rgba(104,203,89,.14);
      --tile-frame:#1a2539;
      --tile-border:rgba(199,215,241,.12);
      --tile-selected:rgba(121,218,108,.12);
      --domino:#f3ebdc;
      --domino-top:#fbf7ef;
      --domino-edge:rgba(123,110,92,.36);
      --domino-line:#877d71;
      --pip:#4d4035;
      --pip-shadow:rgba(255,255,255,.28);
      --pip-outline:rgba(59,44,31,.18);
      --tray:#1b263b;
      --tray-border:rgba(218,229,247,.12);
      --shadow:rgba(0,0,0,.22);
      --wood-top:#7e5c40;
      --wood-mid:#5c3f2b;
      --wood-bottom:#352114;
      --wood-panel:#714d34;
      --wood-panel-bottom:#5a3d29;
      --wood-panel-border:rgba(250,228,196,.14);
      --wood-tray:#412a1d;
      --wood-tray-border:rgba(238,214,186,.14);
      --wood-shadow:rgba(16,8,3,.28);
      --wood-grain:linear-gradient(100deg, rgba(255,236,210,.08) 0%, rgba(255,236,210,0) 16%, rgba(79,48,25,.14) 30%, rgba(255,236,210,0) 46%, rgba(102,61,34,.12) 62%, rgba(255,236,210,0) 78%, rgba(74,44,22,.12) 100%);
      --wood-domino:#d5a46e;
      --wood-domino-top:#efc893;
      --wood-domino-bottom:#bb8552;
      --wood-domino-line:#7e5535;
      --wood-pip:#3c220f;
      --wood-domino-edge:rgba(91,54,29,.58);
      --hero-glow:rgba(117,160,255,.08);
      --danger:#ff9f9f;
      --danger-soft:rgba(255,159,159,.12);
      --accent-first:#7ddd70;
      --accent-first-border:rgba(191,244,183,.72);
      --accent-first-soft:rgba(121,218,108,.16);
      --accent-second:#7ab8ff;
      --accent-second-border:rgba(162,208,255,.78);
      --accent-second-soft:rgba(122,184,255,.16);
      --accent-double:#ffd66f;
      --accent-double-border:rgba(255,224,149,.82);
      --accent-double-soft:rgba(255,214,111,.18);
    }

    html[data-theme="midnight"]{
      --bg-top:#1f2940;
      --bg-mid:#152034;
      --bg-bottom:#0f1726;
      --panel:rgba(16,24,39,.72);
      --panel-2:rgba(20,31,49,.84);
      --pair:#344766;
      --pair-bottom:#2a3a57;
      --pair-border:rgba(191,207,236,.22);
      --tile-frame:rgba(37,51,78,.72);
      --tile-border:rgba(199,215,241,.16);
      --tile-selected:rgba(121,218,108,.16);
      --tray:#26334d;
      --tray-border:rgba(218,229,247,.16);
      --shadow:rgba(0,0,0,.34);
      --hero-glow:rgba(117,160,255,.16);
    }

    html[data-theme="wood"]{
      --bg-top:var(--wood-top);
      --bg-mid:var(--wood-mid);
      --bg-bottom:var(--wood-bottom);
      --text:#f8f2e8;
      --muted:#d6c3ab;
      --soft:#eadfce;
      --panel:rgba(53,34,24,.62);
      --panel-2:rgba(67,43,30,.78);
      --panel-border:rgba(246,225,198,.12);
      --panel-highlight:rgba(255,246,235,.05);
      --pair:var(--wood-panel);
      --pair-bottom:var(--wood-panel-bottom);
      --pair-border:var(--wood-panel-border);
      --tile-frame:rgba(101,69,47,.54);
      --tile-border:rgba(250,228,196,.14);
      --tile-selected:rgba(132,195,96,.14);
      --tray:var(--wood-tray);
      --tray-border:var(--wood-tray-border);
      --shadow:var(--wood-shadow);
      --domino:var(--wood-domino-bottom);
      --domino-top:var(--wood-domino-top);
      --domino-edge:var(--wood-domino-edge);
      --domino-line:var(--wood-domino-line);
      --pip:var(--wood-pip);
      --hero-glow:rgba(255,216,166,.12);
      --danger:#ffc2b0;
      --danger-soft:rgba(255,194,176,.12);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 42%, var(--bg-bottom) 100%);
      transition:background .25s ease,color .25s ease;
    }

    html[data-theme="wood"] body{
      background:
        radial-gradient(circle at 50% -14%, rgba(255,243,224,.06), transparent 28%),
        linear-gradient(180deg, rgba(255,231,203,.06), rgba(255,231,203,0) 24%),
        var(--wood-grain),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 38%, var(--bg-bottom) 100%);
    }

    button,select{
      font:inherit;
      color:inherit;
    }

    button{
      appearance:none;
      border:none;
      cursor:pointer;
    }

    select{
      appearance:none;
      border:none;
      background:none;
    }

    .app{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:24px 14px 28px;
      position:relative;
    }

    .board{
      width:min(760px, calc(100vw - 28px));
      position:relative;
      z-index:1;
    }

    .shell{padding:0;border:none;background:none;box-shadow:none;}

    .hero{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
      padding:2px 2px 0;
      margin-bottom:14px;
    }

    .eyebrow{display:none;}

    .title-wrap{min-width:0;max-width:540px}

    .title{
      margin:0;
      font-size:clamp(1.7rem, 3.6vw, 2.35rem);
      font-weight:850;
      letter-spacing:-.05em;
      line-height:1;
      text-wrap:balance;
    }

    .subtitle{display:none}

    .hero-actions{
      flex:0 0 auto;
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
    }

    .theme-picker{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 8px;
      border-radius:999px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
    }

    .theme-chip{
      width:34px;
      height:34px;
      border-radius:50%;
      border:1px solid transparent;
      position:relative;
      transition:transform .14s ease,border-color .14s ease,box-shadow .14s ease,opacity .14s ease;
      opacity:.82;
    }

    .theme-chip:hover{transform:translateY(-1px);opacity:1}

    .theme-chip.active{
      border-color:rgba(255,255,255,.4);
      box-shadow:0 0 0 2px rgba(255,255,255,.12);
      opacity:1;
    }

    .theme-chip::after{
      content:"";
      position:absolute;
      inset:5px;
      border-radius:50%;
      box-shadow:inset 0 1px 1px rgba(255,255,255,.35), inset 0 -5px 10px rgba(0,0,0,.2);
    }

    .theme-chip[data-theme-option="midnight"]{
      background:linear-gradient(180deg,#31476c,#111a2a);
    }

    .theme-chip[data-theme-option="wood"]{
      background:
        var(--wood-grain),
        linear-gradient(180deg,#d6a16a,#8a5936);
    }

    html[data-theme="wood"] .theme-picker,
    html[data-theme="wood"] .pair-btn,
    html[data-theme="wood"] .tile-btn,
    html[data-theme="wood"] .hand-tray-wrap,
    html[data-theme="wood"] .hero,
    html[data-theme="wood"] .panel,
    html[data-theme="wood"] .mode-toggle,
    html[data-theme="wood"] .compose-select,
    html[data-theme="wood"] .hand-status{
      background-image:
        linear-gradient(180deg, rgba(255,231,203,.08), rgba(255,231,203,0) 42%),
        var(--wood-grain),
        linear-gradient(180deg, color-mix(in srgb, var(--panel-2) 96%, white 4%), var(--panel));
      background-blend-mode:screen, multiply, normal;
    }

    .theme-toggle:hover,
    .pair-btn:hover,
    .tile-btn:hover,
    .confirm-btn:hover,
    .mode-toggle:hover{filter:brightness(1.04)}


    .panel{
      padding:16px;
      margin-bottom:12px;
      border-radius:18px;
      background:linear-gradient(180deg, var(--panel), var(--panel-2));
      border:1px solid var(--panel-border);
      box-shadow:none;
    }

    .panel.hidden{display:none}

    .panel-head{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:14px;
      margin-bottom:14px;
    }

    .panel-title{
      margin:0 0 2px;
      font-size:.95rem;
      font-weight:800;
      letter-spacing:-.025em;
    }

    .panel-copy,
    .counter{
      margin:0;
      color:var(--muted);
      font-size:.88rem;
      line-height:1.4;
    }

    .mode-panel{
      padding:10px 12px;
    }

    .mode-row{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:10px;
      flex-wrap:wrap;
    }

    .mode-control{
      display:inline-grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:4px;
      padding:4px;
      border-radius:999px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
      min-width:0;
    }

    .mode-toggle{
      min-height:34px;
      padding:7px 12px;
      border-radius:999px;
      background:transparent;
      border:1px solid transparent;
      color:var(--muted);
      font-size:.84rem;
      font-weight:800;
      letter-spacing:-.01em;
      transition:background .14s ease,border-color .14s ease,color .14s ease;
    }

    .mode-toggle.active{
      background:var(--pair);
      border-color:var(--pair-border);
      color:var(--text);
    }

    .pair-grid{
      display:grid;
      grid-template-columns:repeat(7, minmax(0, 1fr));
      gap:10px;
    }

    .pair-btn{
      min-height:50px;
      border-radius:12px;
      background:var(--pair);
      border:1px solid var(--pair-border);
      box-shadow:none;
      transition:border-color .14s ease, background .14s ease;
      display:grid;
      place-items:center;
      padding:6px;
      position:relative;
      overflow:hidden;
    }

    .pair-btn.active{
      background:linear-gradient(180deg, #86df78, var(--green-2));
      border-color:var(--green-border);
      box-shadow:0 0 0 2px var(--green-shadow);
    }

    .pair-btn .domino{transform:scale(.88)}

    .tiles-row{
      display:grid;
      grid-template-columns:repeat(7, minmax(0, 1fr));
      gap:10px;
      margin-bottom:14px;
    }

    .tile-btn{
      min-height:140px;
      padding:8px 6px;
      border-radius:16px;
      background:var(--tile-frame);
      border:1px solid var(--tile-border);
      display:grid;
      place-items:center;
      transition:border-color .14s ease, box-shadow .14s ease, background .14s ease;
      position:relative;
      overflow:hidden;
    }

    .tile-btn.selected{
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        var(--tile-selected);
      border-color:var(--green-border);
      box-shadow:0 0 0 2px rgba(121,218,108,.16);
    }

    .compose-shell{
      display:grid;
      gap:12px;
    }

    .compose-card{
      display:grid;
      gap:12px;
      padding:12px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
    }

    .compose-card-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .compose-label{
      font-size:.92rem;
      font-weight:800;
      color:var(--soft);
      letter-spacing:-.01em;
    }

    .compose-choice-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .compose-choice{
      min-width:44px;
      min-height:44px;
      padding:0 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      color:var(--soft);
      display:grid;
      place-items:center;
    }

    .compose-choice.empty{
      color:var(--muted);
    }

    .compose-choice.first-filled{
      border-color:var(--accent-first-border);
      background:var(--accent-first-soft);
      color:var(--text);
    }

    .compose-choice.second-filled{
      border-color:var(--accent-second-border);
      background:var(--accent-second-soft);
      color:var(--text);
    }

    .compose-choice.double-filled{
      border-color:var(--accent-double-border);
      background:var(--accent-double-soft);
      color:var(--text);
    }

    .compose-choice-dot{
      width:12px;
      height:12px;
      border-radius:50%;
      background:currentColor;
      opacity:.94;
      box-shadow:0 0 0 1px rgba(255,255,255,.14) inset;
    }

    .compose-choice.empty .compose-choice-dot{
      opacity:.4;
    }

    .half-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:10px;
    }

    .half-btn{
      min-height:88px;
      padding:8px;
      border-radius:16px;
      border:1px solid var(--tile-border);
      background:var(--tile-frame);
      display:grid;
      place-items:center;
      transition:border-color .14s ease, box-shadow .14s ease, background .14s ease, transform .14s ease;
      position:relative;
      overflow:hidden;
    }

    .half-btn:hover{transform:translateY(-1px)}

    .half-btn.active{
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        var(--tile-selected);
    }

    .half-btn.first{
      border-color:var(--accent-first-border);
      box-shadow:0 0 0 2px var(--accent-first-soft);
      background:
        linear-gradient(180deg, rgba(125,221,112,.08), rgba(125,221,112,0)),
        var(--tile-frame);
    }

    .half-btn.second{
      border-color:var(--accent-second-border);
      box-shadow:0 0 0 2px var(--accent-second-soft);
      background:
        linear-gradient(180deg, rgba(122,184,255,.1), rgba(122,184,255,0)),
        var(--tile-frame);
    }

    .half-btn.double{
      border-color:var(--accent-double-border);
      box-shadow:0 0 0 2px var(--accent-double-soft);
      background:
        linear-gradient(180deg, rgba(255,214,111,.14), rgba(255,214,111,0)),
        var(--tile-frame);
    }

    .half-btn-marker{
      position:absolute;
      inset:auto auto 8px 8px;
      display:inline-flex;
      gap:5px;
      align-items:center;
      pointer-events:none;
    }

    .half-btn-dot{
      width:9px;
      height:9px;
      border-radius:50%;
      box-shadow:0 0 0 1px rgba(255,255,255,.2) inset, 0 2px 6px rgba(0,0,0,.18);
    }

    .half-btn-dot.first{background:var(--accent-first)}
    .half-btn-dot.second{background:var(--accent-second)}
    .half-btn-dot.double{background:var(--accent-double)}

    .half-domino{
      width:44px;
      height:60px;
      border-radius:12px;
      border:1px solid var(--domino-edge);
      background:linear-gradient(180deg, var(--domino-top), var(--domino));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.62), 0 3px 8px rgba(0,0,0,.08);
      display:grid;
      place-items:center;
      padding:8px;
    }

    .half-domino .pips{
      width:24px;
      height:24px;
    }

    .half-domino .pip{
      width:5px;
      height:5px;
    }

    .confirm-btn{
      min-height:48px;
      border-radius:14px;
      font-size:.96rem;
      font-weight:800;
      letter-spacing:-.02em;
      transition:opacity .15s ease, filter .15s ease;
    }

    .confirm-btn:disabled{
      opacity:.55;
      cursor:not-allowed;
      box-shadow:none;
      filter:none;
    }

    .compose-feedback{
      min-height:20px;
      margin:0;
      font-size:.86rem;
      color:var(--muted);
      font-weight:700;
    }

    .compose-feedback.error{color:var(--danger)}
    .compose-feedback.success{color:var(--soft)}

    .sr-only{
      position:absolute;
      width:1px;
      height:1px;
      padding:0;
      margin:-1px;
      overflow:hidden;
      clip:rect(0,0,0,0);
      white-space:nowrap;
      border:0;
    }

    .confirm-btn{
      width:100%;
      height:52px;
      background:linear-gradient(180deg, #7ddd70, #63c85a);
      border:1px solid var(--green-border);
      color:#fbfff8;
      box-shadow:none;
    }

    .hand-zone{
      width:min(980px, calc(100vw - 28px));
      margin-top:40px;
      position:relative;
      z-index:1;
      display:grid;
      justify-items:center;
    }

    .hand-panel-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:10px;
      text-align:left;
    }

    .hand-label{display:none}

    .hand-title{
      margin:0;
      font-size:1rem;
      font-weight:800;
      letter-spacing:-.03em;
      color:var(--soft);
    }

    .hand-copy{
      display:none;
    }

    .hand-status{
      padding:5px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      font-size:.74rem;
      font-weight:800;
      color:var(--soft);
      white-space:nowrap;
      box-shadow:0 4px 12px rgba(0,0,0,.1);
    }

    .hand-head-copy{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .hand-head-actions{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .hand-confirm-btn{
      width:auto;
      min-width:0;
      height:38px;
      padding:0 13px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      white-space:nowrap;
      font-size:.84rem;
      box-shadow:0 8px 18px rgba(56,126,47,.18);
    }

    .hand-confirm-icon{
      font-size:1rem;
      line-height:1;
    }

    .hand-tray-wrap{
      position:relative;
      width:min(100%, 900px);
      padding:12px 14px 10px;
      border-radius:24px;
      border:1px solid color-mix(in srgb, var(--tray-border) 82%, transparent);
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.07), transparent 32%),
        linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,0) 30%),
        linear-gradient(180deg, color-mix(in srgb, var(--tray) 94%, white 6%), var(--tray));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08), inset 0 -1px 0 rgba(0,0,0,.16), 0 16px 34px rgba(0,0,0,.14);
      overflow:visible;
    }

    .hand-tray-wrap::before{
      content:"";
      position:absolute;
      left:10%;
      right:10%;
      top:44px;
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.14), transparent);
      pointer-events:none;
    }

    .hand-tray-wrap::after{
      content:"";
      position:absolute;
      left:20%;
      right:20%;
      bottom:-2px;
      height:24px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,0,0,.2) 0%, rgba(0,0,0,.1) 46%, transparent 78%);
      filter:blur(8px);
      pointer-events:none;
    }

    .hand-tray-wrap.scrollable::before,
    .hand-tray-wrap.scrollable::after{
      opacity:1;
    }

    .scroll-fade{
      position:absolute;
      top:56px;
      bottom:10px;
      width:26px;
      border-radius:14px;
      pointer-events:none;
      opacity:0;
      transition:opacity .18s ease;
      z-index:2;
    }

    .scroll-fade.left{
      left:14px;
      background:linear-gradient(90deg, color-mix(in srgb, var(--tray) 94%, black 6%), rgba(0,0,0,0));
    }

    .scroll-fade.right{
      right:14px;
      background:linear-gradient(270deg, color-mix(in srgb, var(--tray) 94%, black 6%), rgba(0,0,0,0));
    }

    .hand-tray-wrap.can-scroll-left .scroll-fade.left,
    .hand-tray-wrap.can-scroll-right .scroll-fade.right{
      opacity:1;
    }

    .scroll-hint{
      margin:4px 10px 0;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      color:var(--soft);
      font-size:.74rem;
      font-weight:700;
      letter-spacing:.01em;
      opacity:0;
      transform:translateY(-2px);
      transition:opacity .18s ease, transform .18s ease;
      pointer-events:none;
    }

    .scroll-hint::before{
      content:"↔";
      font-size:.95rem;
      line-height:1;
    }

    .hand-tray-wrap.scrollable .scroll-hint{
      opacity:.88;
      transform:translateY(0);
    }

    .hand-tray{
      min-height:108px;
      width:100%;
      border-radius:18px;
      border:none;
      background:transparent;
      box-shadow:none;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      gap:8px;
      padding:6px 10px 4px;
      overflow-x:auto;
      overflow-y:hidden;
      scrollbar-width:none;
      -ms-overflow-style:none;
      scroll-padding-inline:18px;
    }

    .hand-tray::-webkit-scrollbar{display:none}

    .hand-empty{
      align-items:center;
      justify-content:center;
      color:rgba(255,255,255,.64);
      font-size:.96rem;
      text-align:center;
      border:1px dashed rgba(255,255,255,.16);
      background:rgba(255,255,255,.02);
    }

    .hand-tray:not(.hand-empty) > .hand-tile-wrap:first-child{
      margin-left:auto;
    }

    .hand-tray:not(.hand-empty) > .hand-tile-wrap:last-child{
      margin-right:auto;
    }

    .hand-tile-wrap{
      flex:0 0 auto;
      display:flex;
      justify-content:center;
      align-items:flex-end;
      transform-origin:center bottom;
      transition:transform .16s ease, filter .16s ease;
      padding:0;
      margin-inline:0;
      background:none;
      border:none;
      filter:drop-shadow(0 8px 14px rgba(0,0,0,.12));
      transform:none;
    }

    .hand-tile-wrap:nth-child(odd),
    .hand-tile-wrap:nth-child(even){transform:none}
    .hand-tile-wrap:hover{transform:translateY(-3px)}
    .hand-tile-wrap:focus-visible{
      outline:2px solid var(--accent-second-border);
      outline-offset:4px;
      border-radius:16px;
    }

    .hand-tile-wrap .domino.small{
      display:grid;
      place-items:stretch;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.72),
        inset 0 -2px 5px rgba(78,49,24,.1),
        0 8px 14px rgba(0,0,0,.12);
    }

    .domino{
      display:grid;
      grid-template-rows:1fr 1fr;
      overflow:hidden;
      border-radius:16px;
      border:1px solid var(--domino-edge);
      background:
        linear-gradient(145deg, rgba(255,255,255,.34), rgba(255,255,255,0) 26%),
        linear-gradient(180deg, var(--domino-top), var(--domino));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.68),
        inset 0 -2px 4px rgba(78,49,24,.08),
        0 5px 14px rgba(0,0,0,.1);
      position:relative;
    }

    .domino::before{
      content:"";
      position:absolute;
      inset:4px;
      border-radius:12px;
      border:1px solid rgba(122,100,76,.12);
      pointer-events:none;
    }

    .domino::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,0) 24%, rgba(0,0,0,.03) 100%);
      pointer-events:none;
    }

    .domino.large{width:72px;height:112px}
    .domino.small{width:58px;height:92px}
    .domino.pair-visual{width:48px;height:34px;grid-template-columns:1fr 1fr;grid-template-rows:none;border-radius:10px}
    .domino.pair-visual::before{inset:3px;border-radius:8px}
    .domino.pair-visual .half + .half{border-top:none;border-left:2px solid var(--domino-line)}
    .domino.pair-visual .pips{width:16px;height:16px}
    .domino.pair-visual .pip{width:3.6px;height:3.6px}

    .half{
      display:grid;
      place-items:center;
      position:relative;
      background:
        radial-gradient(circle at 28% 22%, rgba(255,255,255,.54), transparent 24%),
        radial-gradient(circle at 72% 78%, rgba(0,0,0,.03), transparent 26%),
        linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,0) 28%),
        linear-gradient(180deg, #fffdf8, var(--domino));
    }

    html[data-theme="wood"] .domino,
    html[data-theme="wood"] .half-domino{
      background:
        linear-gradient(180deg, rgba(255,244,219,.34), rgba(255,244,219,0) 20%),
        repeating-linear-gradient(102deg, rgba(110,67,36,.18) 0 3px, rgba(214,164,110,.08) 3px 8px, rgba(126,85,53,.14) 8px 11px),
        linear-gradient(180deg, var(--domino-top), var(--domino), var(--wood-domino-bottom));
      box-shadow:inset 0 1px 0 rgba(255,248,235,.48), inset 0 -3px 6px rgba(89,57,31,.2), 0 6px 12px rgba(28,15,7,.18);
    }

    html[data-theme="wood"] .half{
      background:
        radial-gradient(circle at 28% 22%, rgba(255,242,220,.26), transparent 28%),
        repeating-linear-gradient(100deg, rgba(101,63,34,.16) 0 3px, rgba(214,164,110,.06) 3px 8px, rgba(91,54,29,.14) 8px 11px),
        linear-gradient(180deg, var(--domino-top), var(--domino), var(--wood-domino-bottom));
    }

    .half + .half{
      border-top:2px solid var(--domino-line);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.2);
    }

    .pips{
      width:28px;
      height:28px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      grid-template-rows:repeat(3,1fr);
    }

    .domino.small .pips{width:20px;height:20px}

    .pip{
      width:6.6px;
      height:6.6px;
      border-radius:50%;
      background:radial-gradient(circle at 34% 34%, color-mix(in srgb, var(--pip) 82%, white 18%), var(--pip) 60%);
      box-shadow:
        0 0 0 1px var(--pip-outline),
        0 .8px 0 var(--pip-shadow) inset,
        0 1px 2px rgba(0,0,0,.16),
        0 0 10px rgba(0,0,0,.02);
      place-self:center;
      opacity:0;
    }

    .domino.small .pip{width:5.2px;height:5.2px}
    .pip.show{opacity:1}

    @media (max-width:820px){
      .board,.hand-zone{width:min(100%, calc(100vw - 24px))}
      .shell{padding:14px}
      .hero{padding:18px}
      .pair-grid,.tiles-row{grid-template-columns:repeat(7, minmax(0, 1fr))}
      .hand-zone{margin-top:36px}
      .hand-tray-wrap{width:min(100%, 860px)}
    }

    @media (max-width:680px){
      .app{padding:20px 10px 20px}
      .shell{padding:10px;border-radius:22px}
      .hero,
      .panel,
      .hand-tray-wrap{border-radius:20px}
      .hero{flex-direction:column;align-items:stretch}
      .hero-actions{align-items:flex-start}
      .theme-picker{justify-content:center}
      .panel-head,
      .mode-row,
      .compose-card-head{flex-direction:column;align-items:flex-start}
      .pair-grid,.tiles-row{grid-template-columns:repeat(4, minmax(0, 1fr));gap:9px}
      .panel{padding:16px}
      .pair-btn{min-height:52px;border-radius:15px}
      .domino.large{width:56px;height:88px}
      .tile-btn{min-height:118px;padding:7px 5px;border-radius:18px}
      .hand-zone{margin-top:24px}
      .hand-tray-wrap{width:100%;padding:12px 10px 8px;border-radius:22px}
      .hand-tray-wrap::before{top:48px}
      .hand-panel-head{justify-content:space-between;align-items:center;text-align:left;gap:10px;margin-bottom:10px}
      .hand-head-copy{width:100%;justify-content:space-between}
      .hand-head-actions{width:100%;justify-content:space-between}
      .hand-confirm-btn{flex:1 1 auto;justify-content:center;height:36px;padding:0 12px}
      .hand-tray{min-height:108px;padding:4px 4px 2px;gap:8px;justify-content:flex-start}
      .hand-tray:not(.hand-empty) > .hand-tile-wrap:first-child,
      .hand-tray:not(.hand-empty) > .hand-tile-wrap:last-child{margin-inline:0}
      .half-grid{grid-template-columns:repeat(4, minmax(0, 1fr))}
      .mode-control{width:100%;min-width:0}
      .compose-choice{min-width:40px;min-height:40px}
      .half-btn{min-height:80px}
      .scroll-hint{justify-content:flex-start}
      .scroll-fade{top:66px;bottom:10px}
      .scroll-fade.left{left:11px}
      .scroll-fade.right{right:11px}
    }

    @media (max-width:560px){
      .pair-grid,.tiles-row,.half-grid{grid-template-columns:repeat(3, minmax(0, 1fr));gap:10px}
      .panel-head{margin-bottom:12px}
      .pair-btn{min-height:56px}
      .tile-btn{min-height:126px;padding:8px 6px}
      .domino.large{width:60px;height:94px}
      .domino.small{width:52px;height:84px}
      .hand-status{padding:5px 9px}
    }

    @media (max-width:420px){
      .title{font-size:1.56rem}
      .subtitle,.panel-copy,.counter,.hand-copy,.compose-feedback{font-size:.9rem}
      .pair-grid,.tiles-row,.half-grid{gap:8px}
      .pair-btn{min-height:52px;border-radius:14px}
      .tile-btn{min-height:114px;padding:6px 4px;border-radius:16px}
      .half-btn{min-height:74px;padding:6px;border-radius:14px}
      .half-domino{width:38px;height:52px}
      .domino.large{width:52px;height:82px}
      .domino.small{width:46px;height:72px}
      .domino.pair-visual{width:38px;height:27px}
      .confirm-btn{height:52px;border-radius:16px}
      .hand-head-actions{align-items:stretch}
      .hand-confirm-btn{width:100%;height:40px;padding:0 12px}
      .hand-tray{gap:6px;padding:4px 2px 2px}
      .hand-status{font-size:.74rem}
      .hand-panel-head{align-items:flex-start}
      .hand-head-copy{align-items:flex-start;gap:8px}
      .hand-tray-wrap::before{top:78px}
      .scroll-fade{top:92px}
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="board">
      <div class="shell">
        <header class="hero">
          <div class="title-wrap">
            <h1 class="title">Tu asistente dominó</h1>
            <p class="subtitle"></p>
          </div>
          <div class="hero-actions">
            <div class="theme-picker" role="group" aria-label="Seleccionar tema visual">
              <button class="theme-chip active" type="button" data-theme-option="midnight" aria-label="Tema noche"></button>
              <button class="theme-chip" type="button" data-theme-option="wood" aria-label="Tema madera"></button>
            </div>
          </div>
        </header>

        <section id="valuesPanel" class="panel" aria-labelledby="valuesTitle">
          <div class="panel-head">
            <div>
              <h2 id="valuesTitle" class="panel-title">Selecciona tus fichas</h2>
              <p id="counter" class="counter">Empieza a seleccionar</p>
            </div>
          </div>

          <div class="compose-shell">
            <section class="compose-card" aria-labelledby="halfSelectorTitle">
              <div class="compose-card-head">
                <h3 id="halfSelectorTitle" class="compose-label">Valores</h3>
                <div class="compose-choice-row" aria-label="Selección actual">
                  <div id="firstHalfChoice" class="compose-choice empty" aria-label="Primera mitad pendiente"><span class="compose-choice-dot" aria-hidden="true"></span><span class="sr-only">Primera mitad pendiente</span></div>
                  <div id="secondHalfChoice" class="compose-choice empty" aria-label="Segunda mitad pendiente"><span class="compose-choice-dot" aria-hidden="true"></span><span class="sr-only">Segunda mitad pendiente</span></div>
                </div>
              </div>
              <div id="sharedHalfGrid" class="half-grid" role="list" aria-label="Opciones para componer la ficha"></div>
            </section>

            <p id="composeFeedback" class="compose-feedback" aria-live="polite"></p>
          </div>
        </section>
      </div>
    </section>

    <section class="hand-zone" aria-label="Mano de dominó seleccionada">
      <div id="handTrayWrap" class="hand-tray-wrap">
        <div class="hand-panel-head">
          <div class="hand-head-copy">
            <h2 class="hand-title">Tu mano</h2>
            <div id="handStatus" class="hand-status">0 / 7</div>
          </div>
          <div class="hand-head-actions">
            <button id="handConfirmBtn" class="confirm-btn hand-confirm-btn" type="button" aria-label="Confirmar mano desde la bandeja">
              <span class="hand-confirm-icon" aria-hidden="true">✓</span>
              <span id="handConfirmLabel">Confirmar</span>
            </button>
          </div>
        </div>
        <div class="scroll-fade left" aria-hidden="true"></div>
        <div class="scroll-fade right" aria-hidden="true"></div>
        <div id="handTray" class="hand-tray hand-empty">Tus fichas aparecerán aquí</div>
        <div id="scrollHint" class="scroll-hint" aria-hidden="true">Desliza la bandeja para ver más fichas</div>
      </div>
    </section>
  </main>

  <script>
    const PIP_MAP={0:[],1:[4],2:[0,8],3:[0,4,8],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]};
    const values=Array.from({length:7},(_,i)=>i);
    const valueLabels=['Blanco','1','2','3','4','5','6'];
    const themes=['midnight','wood'];
    const savedTheme=localStorage.getItem('domino-theme');
    const state={
      selected:[],
      theme:themes.includes(savedTheme)?savedTheme:'midnight',
      compose:{first:null,second:null},
      handConfirmed:false
    };

    const root=document.documentElement;
    const counter=document.getElementById('counter');
    const handConfirmBtn=document.getElementById('handConfirmBtn');
    const handConfirmLabel=document.getElementById('handConfirmLabel');
    const handTray=document.getElementById('handTray');
    const handTrayWrap=document.getElementById('handTrayWrap');
    const scrollHint=document.getElementById('scrollHint');
    const themePicker=document.querySelector('.theme-picker');
    const themeChips=document.querySelectorAll('.theme-chip');
    const handStatus=document.getElementById('handStatus');
    const sharedHalfGrid=document.getElementById('sharedHalfGrid');
    const firstHalfChoice=document.getElementById('firstHalfChoice');
    const secondHalfChoice=document.getElementById('secondHalfChoice');
    const composeFeedback=document.getElementById('composeFeedback');

    const key=tile=>`${tile[0]}-${tile[1]}`;
    const normalize=(a,b)=>a<=b?[a,b]:[b,a];
    const getSelectedKeys=()=>new Set(state.selected.map(key));
    const isDuplicate=tile=>getSelectedKeys().has(key(tile));
    const handFull=()=>state.selected.length>=7;
    const canAddTile=tile=>Boolean(tile) && !isDuplicate(tile) && !handFull();

    function halfDomino(value){
      return `<div class="half-domino" aria-hidden="true">${pips(value)}</div>`;
    }

    function setTheme(theme){
      state.theme=theme;
      root.dataset.theme=theme;
      localStorage.setItem('domino-theme', theme);
      themeChips.forEach(chip=>{
        const active=chip.dataset.themeOption===theme;
        chip.classList.toggle('active', active);
        chip.setAttribute('aria-pressed', String(active));
      });
    }

    function pips(n){
      const visible=new Set(PIP_MAP[n]);
      return `<div class="pips">${Array.from({length:9},(_,i)=>`<span class="pip ${visible.has(i)?'show':''}"></span>`).join('')}</div>`;
    }

    function domino(a,b,size='large',orientation='vertical'){
      return `<div class="domino ${size} ${orientation==='horizontal'?'pair-visual':''}"><div class="half">${pips(a)}</div><div class="half">${pips(b)}</div></div>`;
    }

    function markHandUnconfirmed(){
      state.handConfirmed=false;
    }

    function addTile(tile){
      if(canAddTile(tile)){
        state.selected.push(tile);
        markHandUnconfirmed();
        return true;
      }
      return false;
    }

    function removeTile(tile){
      const tileKey=key(tile);
      const existingIndex=state.selected.findIndex(item=>key(item)===tileKey);
      if(existingIndex>=0){
        state.selected.splice(existingIndex,1);
        markHandUnconfirmed();
        return true;
      }
      return false;
    }

    function clearCompose(){
      state.compose={first:null,second:null};
    }

    function getComposeTile(){
      const {first,second}=state.compose;
      return first===null || second===null ? null : normalize(first,second);
    }

    function getComposeStatus(tile=getComposeTile()){
      if(!tile){
        return {
          tone:'muted',
          message:state.compose.first===null?'Elige la primera mitad.':'Elige la segunda mitad.'
        };
      }
      if(handFull()){
        return {tone:'error',message:'Tu mano ya tiene 7 fichas.'};
      }
      if(isDuplicate(tile)){
        return {tone:'error',message:`${key(tile)} ya está en tu mano.`};
      }
      return {tone:'success',message:`Se añadirá ${key(tile)} al tocar esta segunda mitad.`};
    }


    function selectComposeHalf(value){
      composeFeedback.textContent='';
      composeFeedback.className='compose-feedback';

      if(state.compose.first===null){
        state.compose.first=value;
        renderCompose();
        return;
      }

      if(state.compose.second===null){
        state.compose.second=value;
        const tile=getComposeTile();

        if(canAddTile(tile)){
          addTile(tile);
          composeFeedback.className='compose-feedback success';
          composeFeedback.textContent=`Añadida ${key(tile)}.`;
          clearCompose();
          render();
          return;
        }

        const status=getComposeStatus(tile);
        composeFeedback.className=`compose-feedback${status.tone==='error'?' error':''}`;
        composeFeedback.textContent=status.message;
        renderCompose();
        renderCounter();
        renderHand();
        return;
      }

      state.compose={first:value,second:null};
      renderCompose();
    }

    function renderHalfGrid(){
      const first=state.compose.first;
      const second=state.compose.second;

      sharedHalfGrid.innerHTML=values.map(value=>{
        const isFirst=first===value;
        const isSecond=second===value;
        let roleClass='';
        let marker='';

        if(isFirst && isSecond){
          roleClass='active double';
          marker='<span class="half-btn-marker" aria-hidden="true"><span class="half-btn-dot double"></span><span class="half-btn-dot double"></span></span>';
        }else if(isFirst){
          roleClass='active first';
          marker='<span class="half-btn-marker" aria-hidden="true"><span class="half-btn-dot first"></span></span>';
        }else if(isSecond){
          roleClass='active second';
          marker='<span class="half-btn-marker" aria-hidden="true"><span class="half-btn-dot second"></span></span>';
        }

        const ariaSuffix=isFirst && isSecond
          ? ' seleccionada como doble'
          : isFirst
            ? ' seleccionada como primera mitad'
            : isSecond
              ? ' seleccionada como segunda mitad'
              : '';

        return `
          <button class="half-btn ${roleClass}" type="button" data-value="${value}" aria-label="Valor ${valueLabels[value]}${ariaSuffix}">
            ${marker}
            ${halfDomino(value)}
          </button>
        `;
      }).join('');

      sharedHalfGrid.querySelectorAll('.half-btn').forEach(btn=>{
        btn.onclick=()=>selectComposeHalf(Number(btn.dataset.value));
      });
    }

    function renderCompose(){
      const tile=getComposeTile();
      const status=getComposeStatus(tile);

      renderHalfGrid();

      const isDouble=state.compose.first!==null && state.compose.first===state.compose.second;

      firstHalfChoice.className=`compose-choice${state.compose.first===null?' empty':' first-filled'}${isDouble?' double-filled':''}`;
      firstHalfChoice.setAttribute('aria-label', state.compose.first===null ? 'Primera mitad pendiente' : `Primera mitad: ${valueLabels[state.compose.first]}`);
      firstHalfChoice.innerHTML=`<span class="compose-choice-dot" aria-hidden="true"></span><span class="sr-only">${state.compose.first===null?'Primera mitad pendiente':`Primera mitad: ${valueLabels[state.compose.first]}`}</span>`;

      secondHalfChoice.className=`compose-choice${state.compose.second===null?' empty':' second-filled'}${isDouble?' double-filled':''}`;
      secondHalfChoice.setAttribute('aria-label', state.compose.second===null ? 'Segunda mitad pendiente' : `Segunda mitad: ${valueLabels[state.compose.second]}`);
      secondHalfChoice.innerHTML=`<span class="compose-choice-dot" aria-hidden="true"></span><span class="sr-only">${state.compose.second===null?'Segunda mitad pendiente':`Segunda mitad: ${valueLabels[state.compose.second]}`}</span>`;

      if(!composeFeedback.textContent || !composeFeedback.classList.contains('success')){
        composeFeedback.className=`compose-feedback${status.tone==='error'?' error':status.tone==='success'?' success':''}`;
        composeFeedback.textContent=status.message;
      }
    }

    function renderCounter(){
      const count=state.selected.length;
      const ready=count===7;
      const confirmed=state.handConfirmed;
      counter.textContent=ready ? (confirmed ? 'Mano confirmada' : 'Lista para confirmar') : `${count} / 7 seleccionadas`;
      handStatus.textContent=confirmed ? `Confirmada · ${count} / 7` : `${count} / 7`;
      handConfirmBtn.disabled=!ready;
      handConfirmBtn.setAttribute('aria-pressed', String(confirmed));
      if(ready && confirmed){
        handConfirmLabel.textContent='Confirmada';
      }else{
        handConfirmLabel.textContent='Confirmar';
      }
    }

    function updateHandTrayAffordance(){
      const canScroll=handTray.scrollWidth-handTray.clientWidth>8;
      const maxScroll=Math.max(0, handTray.scrollWidth-handTray.clientWidth);
      const atStart=handTray.scrollLeft<=4;
      const atEnd=handTray.scrollLeft>=maxScroll-4;

      handTrayWrap.classList.toggle('scrollable', canScroll);
      handTrayWrap.classList.toggle('can-scroll-left', canScroll && !atStart);
      handTrayWrap.classList.toggle('can-scroll-right', canScroll && !atEnd);
      scrollHint.setAttribute('aria-hidden', String(!canScroll));
    }

    function renderHand(){
      if(!state.selected.length){
        handTray.className='hand-tray hand-empty';
        handTray.textContent='Tus fichas aparecerán aquí';
        handTray.scrollLeft=0;
        updateHandTrayAffordance();
        return;
      }

      handTray.className='hand-tray';
      handTray.innerHTML=state.selected.map(tile=>{
        const tileKey=key(tile);
        return `
          <button class="hand-tile-wrap" type="button" data-hand-tile="${tileKey}" aria-label="Quitar ficha ${tileKey}">
            ${domino(tile[0],tile[1],'small')}
          </button>
        `;
      }).join('');
      updateHandTrayAffordance();
    }

    function confirmHand(){
      if(state.selected.length===7){
        state.handConfirmed=true;
        renderCounter();
      }
    }

    function render(){
      renderCompose();
      renderCounter();
      renderHand();
    }

    themePicker.addEventListener('click',event=>{
      const chip=event.target.closest('.theme-chip');
      if(!chip) return;
      setTheme(chip.dataset.themeOption);
    });

    handTray.addEventListener('scroll', updateHandTrayAffordance, {passive:true});
    window.addEventListener('resize', updateHandTrayAffordance);

    handTray.addEventListener('click',event=>{
      const button=event.target.closest('[data-hand-tile]');
      if(!button) return;
      const tile=button.dataset.handTile.split('-').map(Number);
      const tileKey=key(tile);
      if(window.confirm(`¿Quitar la ficha ${tileKey} de tu mano?`)){
        removeTile(tile);
        render();
      }
    });

    handConfirmBtn.addEventListener('click', confirmHand);

    setTheme(state.theme);
    render();
  </script>
</body>
</html>
