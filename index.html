<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Domino Assistant</title>
  <style>
    :root{
      --bg:#0b1220;
      --surface:#111a2b;
      --surface-soft:#182235;
      --surface-strong:#1f2b42;
      --border:rgba(148,163,184,.18);
      --border-strong:rgba(96,165,250,.45);
      --text:#eef4ff;
      --muted:#97a6bf;
      --accent:#60a5fa;
      --accent-soft:rgba(96,165,250,.14);
      --success:#22c55e;
      --success-soft:rgba(34,197,94,.14);
      --shadow:0 18px 40px rgba(0,0,0,.26);
      --radius-lg:22px;
      --radius-md:16px;
      --radius-sm:12px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      background:linear-gradient(180deg,#0b1220 0%,#0f172a 100%);
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    .app{
      width:min(760px,100%);
      margin:0 auto;
      padding:28px 16px 20px;
    }

    .screen{
      display:grid;
      gap:16px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:4px 2px;
    }

    h1{
      margin:0;
      font-size:clamp(1.5rem,4vw,2rem);
      letter-spacing:-.04em;
    }

    .counter{
      padding:10px 14px;
      border-radius:999px;
      background:var(--surface-soft);
      border:1px solid var(--border);
      color:var(--text);
      font-size:.92rem;
      font-weight:700;
      white-space:nowrap;
    }

    .pair-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:10px;
    }

    .pair-btn,
    .tile-btn,
    .confirm-btn{
      appearance:none;
      border:none;
      font:inherit;
      color:inherit;
      cursor:pointer;
    }

    .pair-btn{
      display:grid;
      place-items:center;
      gap:8px;
      padding:12px 8px;
      border-radius:18px;
      background:var(--surface);
      border:1px solid var(--border);
      box-shadow:var(--shadow);
      transition:border-color .14s ease, transform .14s ease, background .14s ease;
    }

    .pair-btn:hover,.tile-btn:hover,.confirm-btn:hover{transform:translateY(-1px)}

    .pair-btn.active{
      background:var(--surface-strong);
      border-color:var(--border-strong);
      box-shadow:0 0 0 1px rgba(96,165,250,.2), var(--shadow);
    }

    .pair-label{
      font-size:.95rem;
      font-weight:700;
      letter-spacing:-.02em;
    }

    .tile-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:12px;
    }

    .tile-btn{
      display:grid;
      gap:10px;
      justify-items:center;
      padding:12px 10px;
      min-height:174px;
      border-radius:20px;
      background:var(--surface);
      border:1px solid var(--border);
      box-shadow:var(--shadow);
      transition:border-color .14s ease, transform .14s ease, background .14s ease;
    }

    .tile-btn.sel{
      background:linear-gradient(180deg,var(--success-soft),var(--surface));
      border-color:rgba(34,197,94,.5);
    }

    .tile-name{
      font-size:.95rem;
      font-weight:700;
      letter-spacing:-.02em;
    }

    .confirm-btn{
      width:100%;
      justify-content:center;
      align-items:center;
      padding:14px 18px;
      border-radius:18px;
      background:linear-gradient(180deg,#3b82f6,#2563eb);
      border:1px solid rgba(96,165,250,.45);
      color:white;
      font-weight:800;
      letter-spacing:-.01em;
      box-shadow:var(--shadow);
      display:none;
    }

    .confirm-btn.show{display:inline-flex}

    .tray{
      display:flex;
      align-items:center;
      gap:10px;
      overflow-x:auto;
      padding:10px 2px 2px;
      min-height:74px;
    }

    .tray.empty{
      color:var(--muted);
      font-size:.92rem;
    }

    .mini-tile{
      flex:0 0 auto;
      width:52px;
      padding:6px;
      border-radius:14px;
      background:var(--surface-soft);
      border:1px solid var(--border);
    }

    .domino{width:100%;display:grid;grid-template-rows:1fr 1fr;border-radius:12px;overflow:hidden;background:#e5edf8;border:1px solid rgba(15,23,42,.5)}
    .domino.large{max-width:72px;height:104px}
    .domino.medium{max-width:54px;height:78px}
    .domino.small{height:58px}
    .half{position:relative;display:grid;place-items:center;background:#f8fafc}
    .half + .half{border-top:2px solid #0f172a}
    .pips{width:26px;height:26px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr)}
    .pip{width:6px;height:6px;border-radius:999px;background:#0f172a;place-self:center;opacity:0}
    .pip.show{opacity:1}

    @media (max-width:640px){
      .app{padding:20px 12px 16px}
      .pair-grid,.tile-grid{grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
      .pair-btn{padding:10px 6px;border-radius:16px}
      .tile-btn{padding:10px 6px;min-height:156px;border-radius:18px}
      .domino.large{max-width:62px;height:92px}
      .domino.medium{max-width:48px;height:70px}
      .tile-name,.pair-label{font-size:.88rem}
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="screen">
      <div class="topbar">
        <h1>Domino Assistant</h1>
        <div id="counter" class="counter">0 / 7</div>
      </div>

      <div id="pairGrid" class="pair-grid"></div>

      <div id="tileGrid" class="tile-grid"></div>

      <button id="confirmBtn" class="confirm-btn">Confirmar mano</button>

      <div id="tray" class="tray empty">No tiles selected</div>
    </section>
  </main>

  <script>
    const PIP_MAP={0:[],1:[4],2:[0,8],3:[0,4,8],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]};
    const values=Array.from({length:7},(_,i)=>i);
    const state={activePair:3,selected:[]};

    const pairGrid=document.getElementById('pairGrid');
    const tileGrid=document.getElementById('tileGrid');
    const counter=document.getElementById('counter');
    const confirmBtn=document.getElementById('confirmBtn');
    const tray=document.getElementById('tray');

    const key=t=>`${t[0]}-${t[1]}`;
    const normalize=(a,b)=>a<=b?[a,b]:[b,a];
    const tilesForPair=n=>values.map(v=>normalize(n,v));

    function pips(n){
      const visible=new Set(PIP_MAP[n]);
      return `<div class="pips">${Array.from({length:9},(_,i)=>`<span class="pip ${visible.has(i)?'show':''}"></span>`).join('')}</div>`;
    }

    function domino(a,b,size='medium'){
      return `<div class="domino ${size}"><div class="half">${pips(a)}</div><div class="half">${pips(b)}</div></div>`;
    }

    function renderPairs(){
      pairGrid.innerHTML=values.map(n=>`
        <button class="pair-btn ${state.activePair===n?'active':''}" data-pair="${n}">
          ${domino(n,n,'medium')}
          <div class="pair-label">${n}-${n}</div>
        </button>
      `).join('');

      pairGrid.querySelectorAll('.pair-btn').forEach(btn=>{
        btn.onclick=()=>{
          state.activePair=Number(btn.dataset.pair);
          render();
        };
      });
    }

    function renderTiles(){
      const selectedKeys=new Set(state.selected.map(key));
      tileGrid.innerHTML=tilesForPair(state.activePair).map(tile=>{
        const tileKey=key(tile);
        return `
          <button class="tile-btn ${selectedKeys.has(tileKey)?'sel':''}" data-tile="${tileKey}">
            ${domino(tile[0],tile[1],'large')}
            <div class="tile-name">${tileKey}</div>
          </button>
        `;
      }).join('');

      tileGrid.querySelectorAll('.tile-btn').forEach(btn=>{
        btn.onclick=()=>{
          const tile=btn.dataset.tile.split('-').map(Number);
          const tileKey=key(tile);
          const currentIndex=state.selected.findIndex(item=>key(item)===tileKey);

          if(currentIndex>=0){
            state.selected.splice(currentIndex,1);
          }else if(state.selected.length<7){
            state.selected.push(tile);
          }

          render();
        };
      });
    }

    function renderCounter(){
      counter.textContent=`${state.selected.length} / 7`;
      confirmBtn.classList.toggle('show', state.selected.length===7);
    }

    function renderTray(){
      if(!state.selected.length){
        tray.className='tray empty';
        tray.textContent='No tiles selected';
        return;
      }

      tray.className='tray';
      tray.innerHTML=state.selected.map(tile=>`<div class="mini-tile">${domino(tile[0],tile[1],'small')}</div>`).join('');
    }

    function render(){
      renderPairs();
      renderTiles();
      renderCounter();
      renderTray();
    }

    render();
  </script>
</body>
</html>
