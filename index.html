<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Domino Assistant</title>
  <style>
    :root{
      --bg-top:#182338;
      --bg-mid:#121b2d;
      --bg-bottom:#0d1524;
      --text:#f3f6fb;
      --muted:#a4b0c3;
      --soft:#d4dceb;
      --panel:#182235;
      --panel-2:#131c2d;
      --panel-border:rgba(181,197,224,.12);
      --panel-highlight:rgba(255,255,255,.03);
      --pair:#25324a;
      --pair-bottom:#1f2a40;
      --pair-border:rgba(191,207,236,.14);
      --green:#78d86d;
      --green-2:#63c85a;
      --green-border:rgba(191,244,183,.72);
      --green-shadow:rgba(104,203,89,.14);
      --tile-frame:#1a2539;
      --tile-border:rgba(199,215,241,.12);
      --tile-selected:rgba(121,218,108,.12);
      --domino:#f3ebdc;
      --domino-top:#fffaf1;
      --domino-bottom:#eadbc7;
      --domino-edge:rgba(110,93,73,.52);
      --domino-line:#776857;
      --domino-inlay:rgba(136,118,96,.16);
      --domino-gloss:rgba(255,255,255,.72);
      --domino-shadow:rgba(42,26,12,.22);
      --pip:#453528;
      --pip-shadow:rgba(255,255,255,.34);
      --pip-outline:rgba(43,29,18,.18);
      --tray:#1b263b;
      --tray-border:rgba(218,229,247,.12);
      --shadow:rgba(0,0,0,.22);
      --wood-top:#7e5c40;
      --wood-mid:#5c3f2b;
      --wood-bottom:#352114;
      --wood-panel:#714d34;
      --wood-panel-bottom:#5a3d29;
      --wood-panel-border:rgba(250,228,196,.14);
      --wood-tray:#412a1d;
      --wood-tray-border:rgba(238,214,186,.14);
      --wood-shadow:rgba(16,8,3,.28);
      --wood-grain:linear-gradient(100deg, rgba(255,236,210,.08) 0%, rgba(255,236,210,0) 16%, rgba(79,48,25,.14) 30%, rgba(255,236,210,0) 46%, rgba(102,61,34,.12) 62%, rgba(255,236,210,0) 78%, rgba(74,44,22,.12) 100%);
      --wood-domino:#d5a46e;
      --wood-domino-top:#f2cf9f;
      --wood-domino-bottom:#b77f4c;
      --wood-domino-line:#734927;
      --wood-pip:#341b0b;
      --wood-domino-edge:rgba(82,47,24,.62);
      --hero-glow:rgba(117,160,255,.08);
      --danger:#ff9f9f;
      --danger-soft:rgba(255,159,159,.12);
      --accent-first:#7ddd70;
      --accent-first-border:rgba(191,244,183,.72);
      --accent-first-soft:rgba(121,218,108,.16);
      --accent-second:#7ab8ff;
      --accent-second-border:rgba(162,208,255,.78);
      --accent-second-soft:rgba(122,184,255,.16);
      --accent-double:#ffd66f;
      --accent-double-border:rgba(255,224,149,.82);
      --accent-double-soft:rgba(255,214,111,.18);
      --opponent-shell:rgba(255,255,255,.04);
      --opponent-tile:#2b3b58;
      --opponent-tile-edge:rgba(214,226,247,.16);
      --opponent-tile-line:rgba(255,255,255,.14);
      --opponent-glow:rgba(0,0,0,.18);
    }

    html[data-theme="midnight"]{
      --bg-top:#1f2940;
      --bg-mid:#152034;
      --bg-bottom:#0f1726;
      --panel:rgba(16,24,39,.72);
      --panel-2:rgba(20,31,49,.84);
      --pair:#344766;
      --pair-bottom:#2a3a57;
      --pair-border:rgba(191,207,236,.22);
      --tile-frame:rgba(37,51,78,.72);
      --tile-border:rgba(199,215,241,.16);
      --tile-selected:rgba(121,218,108,.16);
      --tray:#26334d;
      --tray-border:rgba(218,229,247,.16);
      --shadow:rgba(0,0,0,.34);
      --hero-glow:rgba(117,160,255,.16);
    }

    html[data-theme="wood"]{
      --bg-top:var(--wood-top);
      --bg-mid:var(--wood-mid);
      --bg-bottom:var(--wood-bottom);
      --text:#f8f2e8;
      --muted:#d6c3ab;
      --soft:#eadfce;
      --panel:rgba(53,34,24,.62);
      --panel-2:rgba(67,43,30,.78);
      --panel-border:rgba(246,225,198,.12);
      --panel-highlight:rgba(255,246,235,.05);
      --pair:var(--wood-panel);
      --pair-bottom:var(--wood-panel-bottom);
      --pair-border:var(--wood-panel-border);
      --tile-frame:rgba(101,69,47,.54);
      --tile-border:rgba(250,228,196,.14);
      --tile-selected:rgba(132,195,96,.14);
      --tray:var(--wood-tray);
      --tray-border:var(--wood-tray-border);
      --shadow:var(--wood-shadow);
      --domino:var(--wood-domino-bottom);
      --domino-top:var(--wood-domino-top);
      --domino-edge:var(--wood-domino-edge);
      --domino-line:var(--wood-domino-line);
      --pip:var(--wood-pip);
      --hero-glow:rgba(255,216,166,.12);
      --danger:#ffc2b0;
      --danger-soft:rgba(255,194,176,.12);
      --opponent-shell:rgba(255,244,219,.05);
      --opponent-tile:#8e6038;
      --opponent-tile-edge:rgba(255,233,204,.18);
      --opponent-tile-line:rgba(65,36,18,.28);
      --opponent-glow:rgba(16,8,3,.2);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 42%, var(--bg-bottom) 100%);
      transition:background .25s ease,color .25s ease;
    }

    html[data-theme="wood"] body{
      background:
        radial-gradient(circle at 50% -14%, rgba(255,243,224,.06), transparent 28%),
        linear-gradient(180deg, rgba(255,231,203,.06), rgba(255,231,203,0) 24%),
        var(--wood-grain),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 38%, var(--bg-bottom) 100%);
    }

    button,select{
      font:inherit;
      color:inherit;
    }

    button{
      appearance:none;
      border:none;
      cursor:pointer;
    }

    select{
      appearance:none;
      border:none;
      background:none;
    }

    .app{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:24px 14px 28px;
      position:relative;
      gap:20px;
    }

    .app.menu-active{
      justify-content:center;
      padding-top:14px;
      padding-bottom:14px;
    }

    .board{
      width:min(760px, calc(100vw - 28px));
      position:relative;
      z-index:1;
    }

    .board.menu-focus{
      width:min(520px, calc(100vw - 28px));
      margin-top:-3vh;
    }

    .app > .board:first-of-type{order:1}
    #handZone{
      order:2;
      margin-top:auto;
    }

    .shell{padding:0;border:none;background:none;box-shadow:none;}

    .hero{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
      padding:2px 2px 0;
      margin-bottom:14px;
    }

    .hero-minimal{
      justify-content:flex-end;
      margin-bottom:10px;
    }

    .eyebrow{display:none;}

    .title-wrap{min-width:0;max-width:540px}

    .title{
      margin:0;
      font-size:clamp(1.7rem, 3.6vw, 2.35rem);
      font-weight:850;
      letter-spacing:-.05em;
      line-height:1;
      text-wrap:balance;
    }

    .subtitle{display:none}

    .hero-actions{
      flex:0 0 auto;
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
    }

    .theme-picker{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 8px;
      border-radius:999px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
    }

    .theme-chip{
      width:34px;
      height:34px;
      border-radius:50%;
      border:1px solid transparent;
      position:relative;
      transition:transform .14s ease,border-color .14s ease,box-shadow .14s ease,opacity .14s ease;
      opacity:.82;
    }

    .theme-chip:hover{transform:translateY(-1px);opacity:1}

    .theme-chip.active{
      border-color:rgba(255,255,255,.4);
      box-shadow:0 0 0 2px rgba(255,255,255,.12);
      opacity:1;
    }

    .theme-chip::after{
      content:"";
      position:absolute;
      inset:5px;
      border-radius:50%;
      box-shadow:inset 0 1px 1px rgba(255,255,255,.35), inset 0 -5px 10px rgba(0,0,0,.2);
    }

    .theme-chip[data-theme-option="midnight"]{
      background:linear-gradient(180deg,#31476c,#111a2a);
    }

    .theme-chip[data-theme-option="wood"]{
      background:
        var(--wood-grain),
        linear-gradient(180deg,#d6a16a,#8a5936);
    }

    html[data-theme="wood"] .theme-picker,
    html[data-theme="wood"] .pair-btn,
    html[data-theme="wood"] .tile-btn,
    html[data-theme="wood"] .hand-tray-wrap,
    html[data-theme="wood"] .hero,
    html[data-theme="wood"] .panel,
    html[data-theme="wood"] .mode-toggle,
    html[data-theme="wood"] .compose-select,
    html[data-theme="wood"] .hand-status,
    html[data-theme="wood"] .table-stage{
      background-image:
        linear-gradient(180deg, rgba(255,231,203,.08), rgba(255,231,203,0) 42%),
        var(--wood-grain),
        linear-gradient(180deg, color-mix(in srgb, var(--panel-2) 96%, white 4%), var(--panel));
      background-blend-mode:screen, multiply, normal;
    }

    .theme-toggle:hover,
    .pair-btn:hover,
    .tile-btn:hover,
    .confirm-btn:hover,
    .mode-toggle:hover{filter:brightness(1.04)}


    .panel{
      padding:16px;
      margin-bottom:12px;
      border-radius:18px;
      background:linear-gradient(180deg, var(--panel), var(--panel-2));
      border:1px solid var(--panel-border);
      box-shadow:none;
    }

    .panel.hidden{display:none}

    .gate-panel{
      display:grid;
      gap:14px;
    }

    .menu-active .gate-panel{
      text-align:center;
      padding:28px 24px;
      gap:18px;
    }

    .menu-active .gate-actions{
      justify-content:center;
    }

    .gate-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .gate-btn{
      flex:1 1 220px;
      min-height:50px;
      padding:12px 14px;
      border-radius:14px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
      color:var(--soft);
      text-align:left;
      font-weight:800;
      letter-spacing:-.01em;
      transition:border-color .14s ease, background .14s ease, transform .14s ease;
    }

    .menu-active .gate-btn{
      flex:0 1 220px;
      text-align:center;
    }

    .gate-btn:hover{
      transform:translateY(-1px);
      border-color:rgba(255,255,255,.18);
      background:rgba(255,255,255,.05);
    }

    .mode-summary{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:12px;
      padding:10px 12px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
    }

    .mode-summary-copy{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      min-width:0;
    }

    .mode-badge,
    .mode-guidance,
    .mode-edit-btn{
      display:inline-flex;
      align-items:center;
      min-height:32px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.1);
      font-size:.8rem;
      font-weight:800;
      letter-spacing:-.01em;
    }

    .mode-badge{
      background:rgba(255,255,255,.05);
      color:var(--soft);
    }

    .mode-guidance{
      background:var(--accent-first-soft);
      border-color:var(--accent-first-border);
      color:var(--text);
    }

    .mode-edit-btn{
      background:transparent;
      color:var(--soft);
      transition:border-color .14s ease, background .14s ease, transform .14s ease;
    }

    .mode-edit-btn:hover{
      transform:translateY(-1px);
      border-color:rgba(255,255,255,.18);
      background:rgba(255,255,255,.05);
    }

    .flow-locked{display:none !important}

    .panel-head{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:14px;
      margin-bottom:14px;
    }

    .panel-title{
      margin:0 0 2px;
      font-size:.95rem;
      font-weight:800;
      letter-spacing:-.025em;
    }

    .panel-copy,
    .counter{
      margin:0;
      color:var(--muted);
      font-size:.88rem;
      line-height:1.4;
    }

    .mode-panel{
      padding:10px 12px;
    }

    .mode-row{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:10px;
      flex-wrap:wrap;
    }

    .mode-control{
      display:inline-grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:4px;
      padding:4px;
      border-radius:999px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
      min-width:0;
    }

    .mode-toggle{
      min-height:34px;
      padding:7px 12px;
      border-radius:999px;
      background:transparent;
      border:1px solid transparent;
      color:var(--muted);
      font-size:.84rem;
      font-weight:800;
      letter-spacing:-.01em;
      transition:background .14s ease,border-color .14s ease,color .14s ease;
    }

    .mode-toggle.active{
      background:var(--pair);
      border-color:var(--pair-border);
      color:var(--text);
    }

    .pair-grid{
      display:grid;
      grid-template-columns:repeat(7, minmax(0, 1fr));
      gap:10px;
    }

    .pair-btn{
      min-height:50px;
      border-radius:12px;
      background:var(--pair);
      border:1px solid var(--pair-border);
      box-shadow:none;
      transition:border-color .14s ease, background .14s ease;
      display:grid;
      place-items:center;
      padding:6px;
      position:relative;
      overflow:hidden;
    }

    .pair-btn.active{
      background:linear-gradient(180deg, #86df78, var(--green-2));
      border-color:var(--green-border);
      box-shadow:0 0 0 2px var(--green-shadow);
    }

    .pair-btn .domino{transform:scale(.88)}

    .tiles-row{
      display:grid;
      grid-template-columns:repeat(7, minmax(0, 1fr));
      gap:10px;
      margin-bottom:14px;
    }

    .tile-btn{
      min-height:140px;
      padding:10px 8px;
      border-radius:20px;
      background:
        radial-gradient(circle at 50% 14%, rgba(255,255,255,.08), transparent 52%),
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        var(--tile-frame);
      border:1px solid color-mix(in srgb, var(--tile-border) 88%, rgba(255,255,255,.06));
      display:grid;
      place-items:center;
      transition:border-color .14s ease, box-shadow .14s ease, background .14s ease, transform .14s ease;
      position:relative;
      overflow:hidden;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 12px 26px rgba(0,0,0,.16);
    }

    .tile-btn::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,0) 34%);
      opacity:.9;
      pointer-events:none;
    }

    .tile-btn:hover{
      transform:translateY(-2px);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 16px 30px rgba(0,0,0,.2);
    }

    .tile-btn.selected{
      background:
        radial-gradient(circle at 50% 14%, rgba(150,231,139,.14), transparent 52%),
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.01)),
        var(--tile-selected);
      border-color:var(--green-border);
      box-shadow:0 0 0 2px rgba(121,218,108,.16), 0 18px 32px rgba(0,0,0,.18);
    }

    .compose-shell{
      display:grid;
      gap:12px;
    }

    .compose-card{
      display:grid;
      gap:12px;
      padding:12px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
    }

    .compose-card-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .compose-label{
      font-size:.92rem;
      font-weight:800;
      color:var(--soft);
      letter-spacing:-.01em;
    }

    .compose-choice-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .compose-choice{
      min-width:44px;
      min-height:44px;
      padding:0 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      color:var(--soft);
      display:grid;
      place-items:center;
    }

    .compose-choice.empty{
      color:var(--muted);
    }

    .compose-choice.first-filled{
      border-color:var(--accent-first-border);
      background:var(--accent-first-soft);
      color:var(--text);
    }

    .compose-choice.second-filled{
      border-color:var(--accent-second-border);
      background:var(--accent-second-soft);
      color:var(--text);
    }

    .compose-choice.double-filled{
      border-color:var(--accent-double-border);
      background:var(--accent-double-soft);
      color:var(--text);
    }

    .compose-choice-dot{
      width:12px;
      height:12px;
      border-radius:50%;
      background:currentColor;
      opacity:.94;
      box-shadow:0 0 0 1px rgba(255,255,255,.14) inset;
    }

    .compose-choice.empty .compose-choice-dot{
      opacity:.4;
    }

    .half-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:10px;
    }

    .half-btn{
      min-height:88px;
      padding:8px;
      border-radius:16px;
      border:1px solid var(--tile-border);
      background:var(--tile-frame);
      display:grid;
      place-items:center;
      transition:border-color .14s ease, box-shadow .14s ease, background .14s ease, transform .14s ease;
      position:relative;
      overflow:hidden;
    }

    .half-btn:hover{transform:translateY(-1px)}

    .half-btn.active{
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        var(--tile-selected);
    }

    .half-btn.first{
      border-color:var(--accent-first-border);
      box-shadow:0 0 0 2px var(--accent-first-soft);
      background:
        linear-gradient(180deg, rgba(125,221,112,.08), rgba(125,221,112,0)),
        var(--tile-frame);
    }

    .half-btn.second{
      border-color:var(--accent-second-border);
      box-shadow:0 0 0 2px var(--accent-second-soft);
      background:
        linear-gradient(180deg, rgba(122,184,255,.1), rgba(122,184,255,0)),
        var(--tile-frame);
    }

    .half-btn.double{
      border-color:var(--accent-double-border);
      box-shadow:0 0 0 2px var(--accent-double-soft);
      background:
        linear-gradient(180deg, rgba(255,214,111,.14), rgba(255,214,111,0)),
        var(--tile-frame);
    }

    .half-btn-marker{
      position:absolute;
      inset:auto auto 8px 8px;
      display:inline-flex;
      gap:5px;
      align-items:center;
      pointer-events:none;
    }

    .half-btn-dot{
      width:9px;
      height:9px;
      border-radius:50%;
      box-shadow:0 0 0 1px rgba(255,255,255,.2) inset, 0 2px 6px rgba(0,0,0,.18);
    }

    .half-btn-dot.first{background:var(--accent-first)}
    .half-btn-dot.second{background:var(--accent-second)}
    .half-btn-dot.double{background:var(--accent-double)}

    .half-domino{
      width:44px;
      height:60px;
      border-radius:14px;
      border:1px solid var(--domino-edge);
      background:
        linear-gradient(145deg, rgba(255,255,255,.3), rgba(255,255,255,0) 28%),
        linear-gradient(180deg, var(--domino-top), var(--domino), var(--domino-bottom));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.72), inset 0 -2px 4px rgba(78,49,24,.08), 0 6px 12px rgba(0,0,0,.1);
      display:grid;
      place-items:center;
      padding:8px;
      position:relative;
    }

    .half-domino::after{
      content:"";
      position:absolute;
      inset:4px;
      border-radius:10px;
      border:1px solid var(--domino-inlay);
      pointer-events:none;
    }

    .half-domino .pips{
      width:24px;
      height:24px;
    }

    .half-domino .pip{
      width:5px;
      height:5px;
    }

    .confirm-btn{
      min-height:48px;
      border-radius:14px;
      font-size:.96rem;
      font-weight:800;
      letter-spacing:-.02em;
      transition:opacity .15s ease, filter .15s ease;
    }

    .confirm-btn:disabled{
      opacity:.55;
      cursor:not-allowed;
      box-shadow:none;
      filter:none;
    }

    .compose-feedback{
      min-height:20px;
      margin:0;
      font-size:.86rem;
      color:var(--muted);
      font-weight:700;
    }

    .compose-feedback.error{color:var(--danger)}
    .compose-feedback.success{color:var(--soft)}

    .sr-only{
      position:absolute;

      height:1px;
      padding:0;
      margin:-1px;
      overflow:hidden;
      clip:rect(0,0,0,0);
      white-space:nowrap;
      border:0;
    }

    .confirm-btn{
      width:100%;
      height:52px;
      background:linear-gradient(180deg, #7ddd70, #63c85a);

      box-shadow:none;
    }

    .table-stage{
      width:min(1180px, calc(100vw - 24px));
      margin-top:12px;
      padding:22px 22px 16px;
      border-radius:34px;
      border:1px solid color-mix(in srgb, var(--panel-border) 90%, transparent);

        radial-gradient(circle at 50% 18%, rgba(95,145,255,.08), transparent 32%),

      z-index:1;

      padding:18px 18px 126px;
      border-radius:28px;
      border:1px solid rgba(255,255,255,.08);
      background:
        radial-gradient(circle at 50% 42%, rgba(255,255,255,.06), transparent 30%),
        linear-gradient(180deg, rgba(9,89,64,.26), rgba(8,55,42,.5)),
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      overflow:hidden;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05), inset 0 -18px 34px rgba(0,0,0,.16);

    .board-playfield::before{

      position:absolute;
      inset:18px;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.06);
      pointer-events:none;

    .board-playfield-head{

      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    .board-status{margin:4px 0 0;color:var(--soft);font-size:.86rem;font-weight:700}

    .board-ends{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .board-end-chip{padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);font-size:.76rem;font-weight:800;color:var(--text)}

    .board-chain{
      min-height:320px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      padding:14px 10px 28px;
    }

    .board-chain-empty{
      color:rgba(255,255,255,.7);
      font-weight:700;
      border:1px dashed rgba(255,255,255,.14);
      border-radius:22px;
      background:rgba(255,255,255,.03);
    }

    .board-tile{position:relative;display:grid;gap:6px;justify-items:center}
    .board-owner{font-size:.72rem;font-weight:800;color:var(--soft);text-transform:uppercase;letter-spacing:.04em}
    .board-tile .domino.small{width:56px;height:88px}

    .board-selector-overlay{
      position:absolute;
      left:50%;
      bottom:14px;
      transform:translateX(-50%);
      width:min(520px, calc(100% - 28px));
      backdrop-filter:blur(8px);
      background:linear-gradient(180deg, rgba(17,28,45,.92), rgba(17,28,45,.82));
      box-shadow:0 16px 30px rgba(0,0,0,.18);
    }

    .compose-card-head.compact{align-items:center}
    .half-grid.compact{grid-template-columns:repeat(7, minmax(0, 1fr));gap:8px}
    .half-grid.compact .half-btn{min-height:64px;border-radius:14px}
    .half-grid.compact .half-domino{width:34px;height:46px}

    .table-stage.hidden{display:none}

    .table-layout{
      display:grid;
      grid-template-columns:92px minmax(0,1fr) 92px;
      grid-template-rows:auto minmax(0,1fr) auto;
      gap:14px 10px;
      align-items:center;
    }

    .table-center{
      grid-column:2;
      grid-row:2;
      display:grid;
      gap:12px;
      min-width:0;
      align-self:stretch;
    }

    .table-selector-card{
      min-height:100%;
      padding:14px;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
    }

    .table-hand-zone{
      grid-column:1 / -1;
      grid-row:3;
      width:100%;
      margin-top:2px;
    }

    .table-hand-zone .hand-tray-wrap{
      width:100%;
      max-width:none;
      margin:0;
    }

    .opponent-hand{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      min-height:90px;
      padding:8px;
      border-radius:22px;
      background:var(--opponent-shell);
      border:1px solid rgba(255,255,255,.06);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
      overflow:hidden;
    }

    .opponent-hand.top{
      grid-column:2;
      grid-row:1;
    }

    .opponent-hand.left{
      grid-column:1;
      grid-row:2;
      flex-direction:column;
      min-height:250px;
    }

    .opponent-hand.right{
      grid-column:3;
      grid-row:2;
      flex-direction:column;
      min-height:250px;
    }

    .opponent-stack{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      width:100%;
      height:100%;
    }

    .opponent-hand.left .opponent-stack,
    .opponent-hand.right .opponent-stack{
      flex-direction:column;
    }

    .opponent-tile{
      position:relative;
      flex:0 0 auto;
      border-radius:14px;
      border:1px solid var(--opponent-tile-edge);
      background:
        linear-gradient(145deg, rgba(255,255,255,.12), rgba(255,255,255,0) 35%),
        linear-gradient(180deg, color-mix(in srgb, var(--opponent-tile) 90%, white 10%), var(--opponent-tile));
      box-shadow:0 7px 16px var(--opponent-glow), inset 0 1px 0 rgba(255,255,255,.08);
      overflow:hidden;
    }

    .opponent-tile::before,
    .opponent-tile::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .opponent-tile::before{
      background:
        linear-gradient(90deg, transparent 18%, rgba(255,255,255,.08) 18% 20%, transparent 20% 38%, rgba(255,255,255,.06) 38% 40%, transparent 40% 58%, rgba(255,255,255,.08) 58% 60%, transparent 60% 78%, rgba(255,255,255,.06) 78% 80%, transparent 80%),
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,0) 28%);
      opacity:.9;
    }

    .opponent-tile::after{
      inset:50% 8px auto;
      height:2px;
      transform:translateY(-50%);
      background:var(--opponent-tile-line);
      border-radius:999px;
    }

    .opponent-hand.left .opponent-tile,
    .opponent-hand.right .opponent-tile{
      width:62px;
      height:40px;
      margin-block:-3px;
    }

    .opponent-hand.left .opponent-tile::after,
    .opponent-hand.right .opponent-tile::after{
      inset:8px auto 8px 50%;
      width:2px;
      height:auto;
      transform:translateX(-50%);
    }

    .opponent-hand.top .opponent-tile{
      width:40px;
      height:62px;
      margin-block:-3px;
    }

    .hand-zone{
      width:min(980px, calc(100vw - 28px));
      margin-top:18px;
      position:relative;
      z-index:1;
      display:grid;
      justify-items:center;
    }

    .hand-panel-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:10px;
      text-align:left;
    }

    .hand-label{display:none}

    .hand-title{
      margin:0;
      font-size:1rem;
      font-weight:800;
      letter-spacing:-.03em;
      color:var(--soft);
    }

    .hand-copy{
      display:none;
    }

    .hand-status{
      padding:5px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      font-size:.74rem;
      font-weight:800;
      color:var(--soft);
      white-space:nowrap;
      box-shadow:0 4px 12px rgba(0,0,0,.1);
    }

    .hand-head-copy{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .hand-head-actions{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .hand-confirm-btn{
      width:auto;
      min-width:0;
      height:38px;
      padding:0 13px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      white-space:nowrap;
      font-size:.84rem;
      box-shadow:0 8px 18px rgba(56,126,47,.18);
    }

    .hand-confirm-icon{
      font-size:1rem;
      line-height:1;
    }

    .hand-tray-wrap{
      position:relative;
      width:min(100%, 900px);
      padding:12px 14px 10px;
      border-radius:24px;
      border:1px solid color-mix(in srgb, var(--tray-border) 82%, transparent);
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.07), transparent 32%),
        linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,0) 30%),
        linear-gradient(180deg, color-mix(in srgb, var(--tray) 94%, white 6%), var(--tray));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08), inset 0 -1px 0 rgba(0,0,0,.16), 0 16px 34px rgba(0,0,0,.14);
      overflow:visible;
    }

    .hand-tray-wrap::before{
      content:"";
      position:absolute;
      left:10%;
      right:10%;
      top:44px;
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.14), transparent);
      pointer-events:none;
    }

    .hand-tray-wrap::after{
      content:"";
      position:absolute;
      left:20%;
      right:20%;
      bottom:-2px;
      height:24px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,0,0,.2) 0%, rgba(0,0,0,.1) 46%, transparent 78%);
      filter:blur(8px);
      pointer-events:none;
    }

    .hand-tray-wrap.scrollable::before,
    .hand-tray-wrap.scrollable::after{
      opacity:1;
    }

    .scroll-fade{
      position:absolute;
      top:56px;
      bottom:10px;
      width:26px;
      border-radius:14px;
      pointer-events:none;
      opacity:0;
      transition:opacity .18s ease;
      z-index:2;
    }

    .scroll-fade.left{
      left:14px;
      background:linear-gradient(90deg, color-mix(in srgb, var(--tray) 94%, black 6%), rgba(0,0,0,0));
    }

    .scroll-fade.right{
      right:14px;
      background:linear-gradient(270deg, color-mix(in srgb, var(--tray) 94%, black 6%), rgba(0,0,0,0));
    }

    .hand-tray-wrap.can-scroll-left .scroll-fade.left,
    .hand-tray-wrap.can-scroll-right .scroll-fade.right{
      opacity:1;
    }

    .scroll-hint{
      margin:4px 10px 0;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      color:var(--soft);
      font-size:.74rem;
      font-weight:700;
      letter-spacing:.01em;
      opacity:0;
      transform:translateY(-2px);
      transition:opacity .18s ease, transform .18s ease;
      pointer-events:none;
    }

    .scroll-hint::before{
      content:"↔";
      font-size:.95rem;
      line-height:1;
    }

    .hand-tray-wrap.scrollable .scroll-hint{
      opacity:.88;
      transform:translateY(0);
    }

    .hand-tray{
      min-height:108px;
      width:100%;
      border-radius:18px;
      border:none;
      background:transparent;
      box-shadow:none;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      gap:8px;
      padding:6px 10px 4px;
      overflow-x:auto;
      overflow-y:hidden;
      scrollbar-width:none;
      -ms-overflow-style:none;
      scroll-padding-inline:18px;
    }

    .hand-tray::-webkit-scrollbar{display:none}

    .hand-empty{
      align-items:center;
      justify-content:center;
      color:rgba(255,255,255,.64);
      font-size:.96rem;
      text-align:center;
      border:1px dashed rgba(255,255,255,.16);
      background:rgba(255,255,255,.02);
    }

    .hand-tray:not(.hand-empty) > .hand-tile-wrap:first-child{
      margin-left:auto;
    }

    .hand-tray:not(.hand-empty) > .hand-tile-wrap:last-child{
      margin-right:auto;
    }

    .hand-tile-wrap{
      flex:0 0 auto;
      display:flex;
      justify-content:center;
      align-items:flex-end;
      transform-origin:center bottom;
      transition:transform .16s ease, filter .16s ease;
      padding:0;
      margin-inline:0;
      background:none;
      border:none;
      filter:drop-shadow(0 8px 14px rgba(0,0,0,.12));
      transform:none;
    }

    .hand-tile-wrap:nth-child(odd),
    .hand-tile-wrap:nth-child(even){transform:none}
    .hand-tile-wrap:hover{transform:translateY(-3px)}
    .hand-tile-wrap:focus-visible{
      outline:2px solid var(--accent-second-border);
      outline-offset:4px;
      border-radius:16px;
    }

    .hand-tile-wrap .domino.small{
      display:grid;
      place-items:stretch;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.72),
        inset 0 -2px 5px rgba(78,49,24,.1),
        0 8px 14px rgba(0,0,0,.12);
    }

    .hand-tile-wrap.is-opening-double{
      filter:drop-shadow(0 0 10px rgba(255,214,111,.34)) drop-shadow(0 8px 14px rgba(0,0,0,.12));
    }

    .hand-tile-wrap.is-opening-double .domino.small{
      border-color:var(--accent-double-border);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.72),
        inset 0 -2px 5px rgba(78,49,24,.1),
        0 0 0 2px rgba(255,214,111,.22),
        0 10px 18px rgba(255,214,111,.18),
        0 8px 14px rgba(0,0,0,.12);
    }

    .hand-tray-wrap.is-opening-hand{
      border-color:var(--accent-double-border);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        inset 0 -1px 0 rgba(0,0,0,.16),
        0 0 0 1px rgba(255,214,111,.18),
        0 0 26px rgba(255,214,111,.16),
        0 16px 34px rgba(0,0,0,.14);
      animation:opening-hand-pulse 2.2s ease-in-out infinite;
    }

    @keyframes opening-hand-pulse{
      0%,100%{box-shadow:inset 0 1px 0 rgba(255,255,255,.08), inset 0 -1px 0 rgba(0,0,0,.16), 0 0 0 1px rgba(255,214,111,.18), 0 0 22px rgba(255,214,111,.14), 0 16px 34px rgba(0,0,0,.14)}
      50%{box-shadow:inset 0 1px 0 rgba(255,255,255,.08), inset 0 -1px 0 rgba(0,0,0,.16), 0 0 0 1px rgba(255,214,111,.28), 0 0 32px rgba(255,214,111,.22), 0 16px 34px rgba(0,0,0,.14)}
    }

    .domino{
      display:grid;
      grid-template-rows:1fr 1fr;
      overflow:hidden;
      border-radius:18px;
      border:1px solid var(--domino-edge);
      background:
        linear-gradient(145deg, rgba(255,255,255,.38), rgba(255,255,255,0) 26%),
        linear-gradient(180deg, var(--domino-top) 0%, var(--domino) 58%, var(--domino-bottom) 100%);
      box-shadow:
        inset 0 1px 0 var(--domino-gloss),
        inset 0 -3px 6px rgba(78,49,24,.1),
        0 8px 18px rgba(0,0,0,.14),
        0 2px 0 rgba(255,255,255,.08);
      position:relative;
    }

    .domino::before{
      content:"";
      position:absolute;
      inset:4px;
      border-radius:14px;
      border:1px solid var(--domino-inlay);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.18);
      pointer-events:none;
    }

    .domino::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% -8%, rgba(255,255,255,.32), transparent 36%),
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,0) 26%, rgba(0,0,0,.04) 100%);
      pointer-events:none;
    }

    .domino.large{width:76px;height:116px}
    .domino.small{width:60px;height:94px}
    .domino.pair-visual{width:52px;height:36px;grid-template-columns:1fr 1fr;grid-template-rows:none;border-radius:11px}
    .domino.pair-visual::before{inset:3px;border-radius:9px}
    .domino.pair-visual .half + .half{border-top:none;border-left:2px solid var(--domino-line)}
    .domino.pair-visual .pips{width:16px;height:16px}
    .domino.pair-visual .pip{width:3.6px;height:3.6px}

    .half{
      display:grid;
      place-items:center;
      position:relative;
      background:
        radial-gradient(circle at 28% 22%, rgba(255,255,255,.56), transparent 22%),
        radial-gradient(circle at 74% 80%, rgba(82,53,29,.06), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,.22), rgba(255,255,255,0) 28%),
        linear-gradient(180deg, #fffdf8, var(--domino) 72%, var(--domino-bottom));
    }

    html[data-theme="wood"] .domino,
    html[data-theme="wood"] .half-domino{
      background:
        linear-gradient(180deg, rgba(255,244,219,.34), rgba(255,244,219,0) 20%),
        repeating-linear-gradient(102deg, rgba(110,67,36,.18) 0 3px, rgba(214,164,110,.08) 3px 8px, rgba(126,85,53,.14) 8px 11px),
        linear-gradient(180deg, var(--domino-top), var(--domino), var(--wood-domino-bottom));
      box-shadow:inset 0 1px 0 rgba(255,248,235,.48), inset 0 -3px 6px rgba(89,57,31,.2), 0 6px 12px rgba(28,15,7,.18);
    }

    html[data-theme="wood"] .half{
      background:
        radial-gradient(circle at 28% 22%, rgba(255,242,220,.26), transparent 28%),
        repeating-linear-gradient(100deg, rgba(101,63,34,.16) 0 3px, rgba(214,164,110,.06) 3px 8px, rgba(91,54,29,.14) 8px 11px),
        linear-gradient(180deg, var(--domino-top), var(--domino), var(--wood-domino-bottom));
    }

    .half + .half{
      border-top:2px solid var(--domino-line);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.22), 0 -1px 0 rgba(70,48,29,.08);
    }

    .pips{
      width:30px;
      height:30px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      grid-template-rows:repeat(3,1fr);
    }

    .domino.small .pips{width:22px;height:22px}

    .pip{
      width:7px;
      height:7px;
      border-radius:50%;
      background:radial-gradient(circle at 32% 30%, color-mix(in srgb, var(--pip) 78%, white 22%), var(--pip) 62%);
      box-shadow:
        0 0 0 1px var(--pip-outline),
        0 1px 0 var(--pip-shadow) inset,
        0 1px 2px rgba(0,0,0,.18),
        0 0 0 1px rgba(255,255,255,.04);
      place-self:center;
      opacity:0;
    }

    .domino.small .pip{width:5.6px;height:5.6px}
    .pip.show{opacity:1}

    .hidden{display:none !important}

    .opening-stack{
      display:grid;
      gap:14px;
    }

    .opening-note,
    .game-note,
    .summary-chip,
    .player-card,
    .mini-board,
    .my-hand-card{
      border:1px solid var(--panel-border);

      min-height:78px;
      padding:14px;
      border-radius:16px;
      background:var(--tile-frame);
      border:1px solid var(--tile-border);
      box-shadow:0 10px 20px rgba(0,0,0,.12);
    }

    .seat-btn.active,
    .opening-action-btn:hover,
    .seat-btn:hover{

    .summary-chip small,
    .player-card small{color:var(--muted)}

    .opening-actions{display:flex;gap:12px;flex-wrap:wrap}

    .opening-step{
      display:grid;
      gap:12px;
    }

    .opening-step-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin:0;
      font-size:1rem;
      font-weight:800;
      color:var(--soft);
    }

    .opening-step-copy{

    }

    .opening-tile-grid{

      flex-wrap:wrap;
      justify-content:center;
      gap:10px;
      padding:2px 0;
    }

    .opening-tile-btn{
      min-width:72px;
      padding:8px 8px 10px;
      border-radius:20px;
      border:1px solid transparent;
      background:transparent;
      display:grid;
      gap:8px;

      font-weight:700;
      text-align:center;

<body>
  <main class="app">
    <section class="board">
      <div class="shell">
        <div class="hero hero-minimal hidden">
          <div class="hero-actions">
            <div class="theme-picker" role="group" aria-label="Seleccionar tema visual">
              <button class="theme-chip active" type="button" data-theme-option="midnight" aria-label="Tema noche"></button>
              <button class="theme-chip" type="button" data-theme-option="wood" aria-label="Tema madera"></button>
            </div>
          </div>
        </div>

        <section id="startPanel" class="panel gate-panel" aria-label="Menú inicial">
          <div class="gate-actions">
            <button id="newGameBtn" class="gate-btn" type="button">Juego nuevo</button>
            <button id="continueGameBtn" class="gate-btn" type="button">Continuar juego</button>
          </div>
        </section>

        <section id="pointsPanel" class="panel gate-panel flow-locked" aria-label="Puntos objetivo">
          <div class="gate-actions">
            <button id="points70Btn" class="gate-btn" type="button">70</button>
            <button id="points100Btn" class="gate-btn" type="button">100</button>
          </div>
        </section>

        <section id="valuesPanel" class="panel flow-locked" aria-labelledby="valuesTitle">
          <div class="panel-head">
            <div>
              <h2 id="valuesTitle" class="panel-title">Selecciona tus fichas</h2>
            </div>
          </div>

          <div class="compose-shell">
            <section class="compose-card" aria-labelledby="halfSelectorTitle">
              <div class="compose-card-head">
                <h3 id="halfSelectorTitle" class="compose-label">Valores</h3>
                <div class="compose-choice-row" aria-label="Selección actual">
                  <div id="firstHalfChoice" class="compose-choice empty" aria-label="Primera mitad pendiente"><span class="compose-choice-dot" aria-hidden="true"></span><span class="sr-only">Primera mitad pendiente</span></div>
                  <div id="secondHalfChoice" class="compose-choice empty" aria-label="Segunda mitad pendiente"><span class="compose-choice-dot" aria-hidden="true"></span><span class="sr-only">Segunda mitad pendiente</span></div>
                </div>
              </div>
              <div id="sharedHalfGrid" class="half-grid" role="list" aria-label="Opciones para componer la ficha"></div>
            </section>

          </div>
        </section>
      </div>
    </section>

    <section id="tableStage" class="table-stage hidden" aria-label="Mesa con manos simuladas de los rivales">
      <div class="table-layout">
        <section class="opponent-hand top" aria-label="Mano simulada del jugador de arriba">
          <div id="topOpponent" class="opponent-stack" aria-hidden="true"></div>
        </section>
        <section class="opponent-hand left" aria-label="Mano simulada del jugador de la izquierda">
          <div id="leftOpponent" class="opponent-stack" aria-hidden="true"></div>
        </section>
        <section class="opponent-hand right" aria-label="Mano simulada del jugador de la derecha">
          <div id="rightOpponent" class="opponent-stack" aria-hidden="true"></div>
        </section>
        <section class="table-center" aria-label="Área central de interacción en la mesa">
          <section id="boardPlayfield" class="board-playfield" aria-label="Tablero principal de juego">
            <div class="board-playfield-head">
              <div>
                <h3 class="compose-label">Mesa</h3>
                <p id="boardStatus" class="board-status">Confirma tu mano para empezar la simulación.</p>
              </div>
              <div id="boardEnds" class="board-ends hidden" aria-live="polite"></div>
            </div>
            <div id="boardChain" class="board-chain board-chain-empty">La cadena aparecerá aquí.</div>
            <section class="compose-card table-selector-card board-selector-overlay" aria-labelledby="tableHalfSelectorTitle">
              <div class="compose-card-head compact">
                <h3 id="tableHalfSelectorTitle" class="compose-label">Selector</h3>
                <div class="compose-choice-row" aria-label="Selección actual en mesa">
                  <div id="tableFirstHalfChoice" class="compose-choice empty" aria-label="Primera mitad pendiente"><span class="compose-choice-dot" aria-hidden="true"></span><span class="sr-only">Primera mitad pendiente</span></div>
                  <div id="tableSecondHalfChoice" class="compose-choice empty" aria-label="Segunda mitad pendiente"><span class="compose-choice-dot" aria-hidden="true"></span><span class="sr-only">Segunda mitad pendiente</span></div>
                </div>
              </div>
              <div id="tableSharedHalfGrid" class="half-grid compact" role="list" aria-label="Opciones para componer la ficha en mesa"></div>
            </section>
          </section>
        </section>
        <section id="tableHandZone" class="hand-zone table-hand-zone" aria-label="Tu mano integrada en la mesa">
          <div id="tableHandTrayWrap" class="hand-tray-wrap">
            <div class="hand-panel-head">
              <div class="hand-head-copy">
                <h2 class="hand-title">Tu mano</h2>
                <div id="tableHandStatus" class="hand-status">0 / 7</div>
              </div>
              <div class="hand-head-actions">
                <button id="tableHandConfirmBtn" class="confirm-btn hand-confirm-btn" type="button" aria-label="Confirmar mano desde la mesa">
                  <span class="hand-confirm-icon" aria-hidden="true">✓</span>
                  <span id="tableHandConfirmLabel">Confirmar</span>
                </button>
              </div>
            </div>
            <div class="scroll-fade left" aria-hidden="true"></div>
            <div class="scroll-fade right" aria-hidden="true"></div>
            <div id="tableHandTray" class="hand-tray hand-empty"></div>
          </div>
        </section>
      </div>
    </section>

    <section id="handZone" class="hand-zone flow-locked" aria-label="Mano de dominó seleccionada">
      <div id="handTrayWrap" class="hand-tray-wrap">
        <div class="hand-panel-head">
          <div class="hand-head-copy">
            <h2 class="hand-title">Tu mano</h2>
            <div id="handStatus" class="hand-status">0 / 7</div>
          </div>
          <div class="hand-head-actions">
            <button id="handConfirmBtn" class="confirm-btn hand-confirm-btn" type="button" aria-label="Confirmar mano desde la bandeja">
              <span class="hand-confirm-icon" aria-hidden="true">✓</span>
              <span id="handConfirmLabel">Confirmar</span>
            </button>
          </div>
        </div>
        <div class="scroll-fade left" aria-hidden="true"></div>
        <div class="scroll-fade right" aria-hidden="true"></div>
        <div id="handTray" class="hand-tray hand-empty"></div>
      </div>
    </section>

  </main>

  <script type="module">
    import { createDoubleSixSet, createGame, createPlayers, getLegalMoves, passTurn, playTile } from './src/domino-engine.js';

    const PIP_MAP={0:[],1:[4],2:[0,8],3:[0,4,8],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]};
    const values=Array.from({length:7},(_,i)=>i);
    const valueLabels=['Blanco','1','2','3','4','5','6'];
    const themes=['midnight','wood'];
    const savedTheme=localStorage.getItem('domino-theme');
    const state={selected:[],theme:themes.includes(savedTheme)?savedTheme:'midnight',compose:{first:null,second:null},handConfirmed:false,phase:'start_menu',startMode:null,targetPoints:null,userHasOpeningDouble:false,userIsOpener:false,game:null,playerId:0,lastMove:null};

    const root=document.documentElement;
    const app=document.querySelector('.app');
    const board=document.querySelector('.board');
    const startPanel=document.getElementById('startPanel');
    const newGameBtn=document.getElementById('newGameBtn');
    const continueGameBtn=document.getElementById('continueGameBtn');
    const pointsPanel=document.getElementById('pointsPanel');
    const points70Btn=document.getElementById('points70Btn');
    const points100Btn=document.getElementById('points100Btn');
    const valuesPanel=document.getElementById('valuesPanel');
    const tableStage=document.getElementById('tableStage');
    const topOpponent=document.getElementById('topOpponent');
    const leftOpponent=document.getElementById('leftOpponent');
    const rightOpponent=document.getElementById('rightOpponent');
    const boardChain=document.getElementById('boardChain');
    const boardStatus=document.getElementById('boardStatus');
    const boardEnds=document.getElementById('boardEnds');
    const handZone=document.getElementById('handZone');
    const handConfirmBtn=document.getElementById('handConfirmBtn');
    const handConfirmLabel=document.getElementById('handConfirmLabel');
    const handTray=document.getElementById('handTray');
    const handTrayWrap=document.getElementById('handTrayWrap');
    const tableHandZone=document.getElementById('tableHandZone');
    const tableHandConfirmBtn=document.getElementById('tableHandConfirmBtn');
    const tableHandConfirmLabel=document.getElementById('tableHandConfirmLabel');
    const tableHandTray=document.getElementById('tableHandTray');
    const tableHandTrayWrap=document.getElementById('tableHandTrayWrap');
    const themePicker=document.querySelector('.theme-picker');
    const themeChips=document.querySelectorAll('.theme-chip');
    const handStatus=document.getElementById('handStatus');
    const tableHandStatus=document.getElementById('tableHandStatus');
    const sharedHalfGrid=document.getElementById('sharedHalfGrid');
    const tableSharedHalfGrid=document.getElementById('tableSharedHalfGrid');
    const firstHalfChoice=document.getElementById('firstHalfChoice');
    const secondHalfChoice=document.getElementById('secondHalfChoice');
    const tableFirstHalfChoice=document.getElementById('tableFirstHalfChoice');
    const tableSecondHalfChoice=document.getElementById('tableSecondHalfChoice');
    const handTrays=[handTray, tableHandTray];
    const handTrayWraps=[handTrayWrap, tableHandTrayWrap];
    const handStatusBadges=[handStatus, tableHandStatus];
    const handConfirmButtons=[handConfirmBtn, tableHandConfirmBtn];
    const handConfirmLabels=[handConfirmLabel, tableHandConfirmLabel];
    const composeTargets=[{grid:sharedHalfGrid, first:firstHalfChoice, second:secondHalfChoice},{grid:tableSharedHalfGrid, first:tableFirstHalfChoice, second:tableSecondHalfChoice}];

    const key=tile=>`${tile[0] ?? tile.a}-${tile[1] ?? tile.b}`;
    const normalize=(a,b)=>a<=b?[a,b]:[b,a];
    const getSelectedKeys=()=>new Set(state.selected.map(key));
    const isDuplicate=tile=>getSelectedKeys().has(key(tile));
    const handFull=()=>state.selected.length>=7;
    const canAddTile=tile=>Boolean(tile) && !isDuplicate(tile) && !handFull();
    const toEngineTile=tile=>({a:tile[0] ?? tile.a,b:tile[1] ?? tile.b});
    const asArrayTile=tile=>[tile.a ?? tile[0],tile.b ?? tile[1]];

    function halfDomino(value){ return `<div class="half-domino" aria-hidden="true">${pips(value)}</div>`; }
    function setTheme(theme){ state.theme=theme; root.dataset.theme=theme; localStorage.setItem('domino-theme', theme); themeChips.forEach(chip=>{ const active=chip.dataset.themeOption===theme; chip.classList.toggle('active', active); chip.setAttribute('aria-pressed', String(active)); }); }
    function pips(n){ const visible=new Set(PIP_MAP[n]); return `<div class="pips">${Array.from({length:9},(_,i)=>`<span class="pip ${visible.has(i)?'show':''}"></span>`).join('')}</div>`; }
    function domino(a,b,size='large',orientation='vertical'){ return `<div class="domino ${size} ${orientation==='horizontal'?'pair-visual':''}"><div class="half">${pips(a)}</div><div class="half">${pips(b)}</div></div>`; }

    function markHandUnconfirmed(){ state.handConfirmed=false; state.phase='build_hand'; state.userHasOpeningDouble=false; state.userIsOpener=false; state.game=null; state.lastMove=null; }
    function addTile(tile){ if(canAddTile(tile)){ state.selected.push(tile); markHandUnconfirmed(); return true; } return false; }
    function removeTile(tile){ const i=state.selected.findIndex(item=>key(item)===key(tile)); if(i>=0){ state.selected.splice(i,1); markHandUnconfirmed(); return true; } return false; }
    function clearCompose(){ state.compose={first:null,second:null}; }
    function getComposeTile(){ const {first,second}=state.compose; return first===null || second===null ? null : normalize(first,second); }

    function selectComposeHalf(value){
      if(state.compose.first===null){ state.compose.first=value; renderCompose(); return; }
      if(state.compose.second===null){
        state.compose.second=value;
        const tile=getComposeTile();
        if(canAddTile(tile)){ addTile(tile); clearCompose(); render(); return; }
        renderCompose(); renderCounter(); renderHand(); return;
      }
      state.compose={first:value,second:null}; renderCompose();
    }

    function renderHalfGrid(){
      const first=state.compose.first; const second=state.compose.second;
      const markup=values.map(value=>{
        const isFirst=first===value, isSecond=second===value;
        let roleClass='', marker='';
        if(isFirst && isSecond){ roleClass='active double'; marker='<span class="half-btn-marker" aria-hidden="true"><span class="half-btn-dot double"></span><span class="half-btn-dot double"></span></span>'; }
        else if(isFirst){ roleClass='active first'; marker='<span class="half-btn-marker" aria-hidden="true"><span class="half-btn-dot first"></span></span>'; }
        else if(isSecond){ roleClass='active second'; marker='<span class="half-btn-marker" aria-hidden="true"><span class="half-btn-dot second"></span></span>'; }
        const ariaSuffix=isFirst && isSecond ? ' seleccionada como doble' : isFirst ? ' seleccionada como primera mitad' : isSecond ? ' seleccionada como segunda mitad' : '';
        return `<button class="half-btn ${roleClass}" type="button" data-value="${value}" aria-label="Valor ${valueLabels[value]}${ariaSuffix}">${marker}${halfDomino(value)}</button>`;
      }).join('');
      composeTargets.forEach(({grid})=>{ grid.innerHTML=markup; grid.querySelectorAll('.half-btn').forEach(btn=>{ btn.onclick=()=>selectComposeHalf(Number(btn.dataset.value)); }); });
    }

    function renderCompose(){
      renderHalfGrid();
      const isDouble=state.compose.first!==null && state.compose.first===state.compose.second;
      composeTargets.forEach(({first,second})=>{
        first.className=`compose-choice${state.compose.first===null?' empty':' first-filled'}${isDouble?' double-filled':''}`;
        first.setAttribute('aria-label', state.compose.first===null ? 'Primera mitad pendiente' : `Primera mitad: ${valueLabels[state.compose.first]}`);
        first.innerHTML=`<span class="compose-choice-dot" aria-hidden="true"></span><span class="sr-only">${state.compose.first===null?'Primera mitad pendiente':`Primera mitad: ${valueLabels[state.compose.first]}`}</span>`;
        second.className=`compose-choice${state.compose.second===null?' empty':' second-filled'}${isDouble?' double-filled':''}`;
        second.setAttribute('aria-label', state.compose.second===null ? 'Segunda mitad pendiente' : `Segunda mitad: ${valueLabels[state.compose.second]}`);
        second.innerHTML=`<span class="compose-choice-dot" aria-hidden="true"></span><span class="sr-only">${state.compose.second===null?'Segunda mitad pendiente':`Segunda mitad: ${valueLabels[state.compose.second]}`}</span>`;
      });
    }

    function renderFlow(){
      const atStart=state.phase==='start_menu', atPoints=state.phase==='points_menu', atBuilder=state.phase==='build_hand' || state.phase==='hand_confirmed', menuActive=atStart || atPoints;
      app.classList.toggle('menu-active', menuActive); board.classList.toggle('menu-focus', menuActive); startPanel.classList.toggle('hidden', !atStart); pointsPanel.classList.toggle('flow-locked', !atPoints); valuesPanel.classList.toggle('flow-locked', !atBuilder || state.phase==='hand_confirmed'); handZone.classList.toggle('flow-locked', !atBuilder || state.phase==='hand_confirmed'); tableStage.classList.toggle('hidden', state.phase!=='hand_confirmed'); tableHandZone.classList.toggle('flow-locked', state.phase!=='hand_confirmed');
    }

    const startNewGame=()=>{ state.startMode='new'; state.targetPoints=null; state.phase='points_menu'; render(); };
    const continueGame=()=>{ state.startMode='continue'; state.phase='build_hand'; render(); };
    const chooseTargetPoints=points=>{ state.targetPoints=points; state.phase='build_hand'; render(); };

    function renderCounter(){
      const count=state.selected.length, ready=count===7, confirmed=state.handConfirmed;
      handStatusBadges.forEach(node=>{ node.textContent=`${count} / 7`; });
      handConfirmButtons.forEach(button=>{ button.disabled=!ready || confirmed; button.setAttribute('aria-pressed', String(confirmed)); });
      handConfirmLabels.forEach(label=>{ label.textContent=confirmed ? 'Confirmada' : 'Confirmar'; });
    }

    function updateSingleHandTrayAffordance(tray,wrap){ const canScroll=tray.scrollWidth-tray.clientWidth>8, maxScroll=Math.max(0, tray.scrollWidth-tray.clientWidth), atStart=tray.scrollLeft<=4, atEnd=tray.scrollLeft>=maxScroll-4; wrap.classList.toggle('scrollable', canScroll); wrap.classList.toggle('can-scroll-left', canScroll && !atStart); wrap.classList.toggle('can-scroll-right', canScroll && !atEnd); }
    const updateHandTrayAffordance=()=>handTrays.forEach((tray,index)=>updateSingleHandTrayAffordance(tray, handTrayWraps[index]));

    function getPlayerHand(){ return state.game?.hands.find(hand=>hand.playerId===state.playerId)?.tiles ?? state.selected.map(toEngineTile); }

    function renderHand(){
      const playerHand=getPlayerHand().map(asArrayTile);
      handTrayWraps.forEach(wrap=>wrap.classList.toggle('is-opening-hand', state.userHasOpeningDouble));
      if(!playerHand.length){ handTrays.forEach(tray=>{ tray.className='hand-tray hand-empty'; tray.textContent=''; tray.scrollLeft=0; }); updateHandTrayAffordance(); return; }
      const legalMoves=state.game ? getLegalMoves(state.game, state.playerId) : [];
      const legalMoveKeys=new Set(legalMoves.map(move=>`${move.tile.key}:${move.side ?? 'start'}`));
      const markup=playerHand.map(tile=>{
        const tileKey=key(tile); const isOpeningDouble=state.userHasOpeningDouble && tile[0]===6 && tile[1]===6;
        const playable=Array.from(legalMoveKeys).some(entry=>entry.startsWith(`${tileKey}:`));
        return `<button class="hand-tile-wrap${isOpeningDouble?' is-opening-double':''}" type="button" data-hand-tile="${tileKey}" aria-label="${state.handConfirmed ? `Jugar ficha ${tileKey}` : `Quitar ficha ${tileKey}`}" ${state.handConfirmed && !playable?'disabled':''}>${domino(tile[0],tile[1],'small')}</button>`;
      }).join('');
      handTrays.forEach(tray=>{ tray.className='hand-tray'; tray.innerHTML=markup; }); updateHandTrayAffordance();
    }

    function createOpponentTiles(position, count=7){
      const tiltMap={top:[-8,-5,-2,0,2,5,8],left:[-6,-4,-1,0,1,4,6],right:[6,4,1,0,-1,-4,-6]}, axis=position==='top' ? 'Y' : 'X';
      return tiltMap[position].slice(0,count).map((tilt,index)=>`<span class="opponent-tile" style="transform:rotate(${tilt}deg) translate${axis}(${(index-3)*0.5}px);"></span>`).join('');
    }

    function renderOpponentHands(){
      if(state.phase!=='hand_confirmed' || !state.game){ topOpponent.innerHTML=''; leftOpponent.innerHTML=''; rightOpponent.innerHTML=''; return; }
      topOpponent.innerHTML=createOpponentTiles('top', state.game.hands[2]?.tiles.length ?? 7);
      leftOpponent.innerHTML=createOpponentTiles('left', state.game.hands[1]?.tiles.length ?? 7);
      rightOpponent.innerHTML=createOpponentTiles('right', state.game.hands[3]?.tiles.length ?? 7);
    }

    function buildGameFromSelection(){
      const userKeys=new Set(state.selected.map(key));
      const remaining=createDoubleSixSet().filter(tile=>!userKeys.has(tile.key));
      const hands=[
        {playerId:0, tiles:state.selected.map(toEngineTile)},
        {playerId:1, tiles:remaining.slice(0,7)},
        {playerId:2, tiles:remaining.slice(7,14)},
        {playerId:3, tiles:remaining.slice(14,21)}
      ];
      return createGame({players:createPlayers(), hands});
    }

    function maybeAutoAdvanceOpponents(){
      if(!state.game || state.game.status!=='in_progress') return;
      let guard=0;
      while(state.game.currentPlayerId!==state.playerId && state.game.status==='in_progress' && guard<12){
        guard+=1;
        const moves=getLegalMoves(state.game);
        if(moves.length){ const move=moves[0]; playTile(state.game,{tile:move.tile, side:move.side}); state.lastMove={playerId:state.game.moveHistory.at(-1).playerId,tile:move.tile.key,side:move.side ?? 'start'}; }
        else { const playerId=state.game.currentPlayerId; passTurn(state.game, playerId); state.lastMove={playerId,tile:'pasa',side:'pass'}; }
      }
    }

    function renderBoard(){
      if(!state.game || !state.game.board.length){ boardChain.className='board-chain board-chain-empty'; boardChain.textContent='La cadena aparecerá aquí.'; boardEnds.classList.add('hidden'); boardEnds.innerHTML=''; boardStatus.textContent='Confirma tu mano para empezar la simulación.'; return; }
      boardChain.className='board-chain';
      boardChain.innerHTML=state.game.board.map(entry=>`<div class="board-tile"><span class="board-owner">P${entry.playerId+1}</span>${domino(entry.left,entry.right,'small')}</div>`).join('');
      boardEnds.classList.remove('hidden');
      boardEnds.innerHTML=`<span class="board-end-chip">Izquierda ${state.game.ends.left}</span><span class="board-end-chip">Derecha ${state.game.ends.right}</span>`;
      const turnLabel=state.game.status==='finished' ? `Ronda terminada. Ganó P${state.game.winner.playerId+1}.` : state.game.currentPlayerId===state.playerId ? 'Tu turno: toca una ficha válida de tu mano.' : `Turno de P${state.game.currentPlayerId+1}.`;
      const lastMoveLabel=state.lastMove ? state.lastMove.side==='pass' ? ` Última jugada: P${state.lastMove.playerId+1} pasó.` : ` Última jugada: P${state.lastMove.playerId+1} puso ${state.lastMove.tile}${state.lastMove.side==='start'?'':` a la ${state.lastMove.side==='left'?'izquierda':'derecha'}`}.` : ''; 
      boardStatus.textContent=`${turnLabel}${lastMoveLabel}`;
    }

    function confirmHand(){
      if(state.selected.length!==7) return;
      state.handConfirmed=true; state.userHasOpeningDouble=state.selected.some(tile=>tile[0]===6 && tile[1]===6); state.userIsOpener=state.userHasOpeningDouble; state.game=buildGameFromSelection(); state.phase='hand_confirmed'; state.lastMove=null;
      maybeAutoAdvanceOpponents(); render();
    }

    function handleHandTileClick(tile){
      if(!state.handConfirmed){ if(window.confirm(`¿Quitar la ficha ${key(tile)} de tu mano?`)){ removeTile(tile); render(); } return; }
      if(!state.game || state.game.currentPlayerId!==state.playerId || state.game.status!=='in_progress') return;
      const moves=getLegalMoves(state.game, state.playerId).filter(move=>move.tile.key===key(tile));
      if(!moves.length) return;
      const move=moves.find(entry=>entry.side==='right') ?? moves[0];
      playTile(state.game,{playerId:state.playerId,tile:move.tile,side:move.side});
      state.lastMove={playerId:state.playerId,tile:key(tile),side:move.side ?? 'start'};
      maybeAutoAdvanceOpponents();
      render();
    }

    function render(){ renderFlow(); if(state.phase!=='build_hand' && state.phase!=='hand_confirmed') return; renderCompose(); renderCounter(); renderHand(); renderOpponentHands(); renderBoard(); }

    themePicker.addEventListener('click',event=>{ const chip=event.target.closest('.theme-chip'); if(!chip) return; setTheme(chip.dataset.themeOption); });
    handTrays.forEach((tray,index)=>{ tray.addEventListener('scroll', ()=>updateSingleHandTrayAffordance(tray, handTrayWraps[index]), {passive:true}); tray.addEventListener('click',event=>{ const button=event.target.closest('[data-hand-tile]'); if(!button) return; handleHandTileClick(button.dataset.handTile.split('-').map(Number)); }); });
    window.addEventListener('resize', updateHandTrayAffordance);
    handConfirmButtons.forEach(button=>button.addEventListener('click', confirmHand));
    newGameBtn.addEventListener('click', startNewGame); continueGameBtn.addEventListener('click', continueGame); points70Btn.addEventListener('click',()=>chooseTargetPoints(70)); points100Btn.addEventListener('click',()=>chooseTargetPoints(100));
    setTheme(state.theme); render();
  </script>
</body>
</html>
