<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Domino Assistant</title>
  <style>
    :root{
      --bg-top:#4b5268;
      --bg-mid:#39415a;
      --bg-bottom:#2c344d;
      --text:#f5f7fb;
      --muted:#d9deeb;
      --pair:#596178;
      --pair-bottom:#50576d;
      --pair-border:rgba(225,232,246,.34);
      --green:#79da6c;
      --green-2:#68cb59;
      --green-border:#bcf5b3;
      --green-shadow:rgba(104,203,89,.18);
      --tile-frame:rgba(70,78,103,.38);
      --tile-border:rgba(225,232,246,.18);
      --tile-selected:rgba(121,218,108,.14);
      --domino:#f3ebdc;
      --domino-top:#fbf7ef;
      --domino-edge:rgba(123,110,92,.42);
      --domino-line:#877d71;
      --pip:#665b4f;
      --tray:#3d4561;
      --tray-border:rgba(214,222,238,.3);
      --shadow:rgba(0,0,0,.22);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 50% -14%, rgba(255,255,255,.07), transparent 28%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 34%, var(--bg-bottom) 100%);
    }

    .app{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:76px 16px 26px;
    }

    .board{
      width:min(596px, calc(100vw - 32px));
      align-self:center;
    }

    .cluster{
      width:min(596px, 100%);
    }

    .title{
      margin:0 0 8px;
      font-size:clamp(1.36rem, 2vw, 1.72rem);
      font-weight:800;
      letter-spacing:-.025em;
      line-height:1.1;
      text-align:left;
    }

    .counter{
      margin:0 0 14px;
      font-size:1rem;
      font-weight:700;
      color:var(--muted);
      line-height:1.1;
      text-align:left;
    }

    button{
      appearance:none;
      border:none;
      font:inherit;
      color:inherit;
      cursor:pointer;
    }

    .pair-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:8px 10px;
      margin-bottom:10px;
    }

    .pair-btn{
      height:39px;
      border-radius:10px;
      background:linear-gradient(180deg, var(--pair), var(--pair-bottom));
      border:1px solid var(--pair-border);
      color:#f8fbff;
      font-size:.98rem;
      font-weight:700;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08), 0 1px 5px rgba(0,0,0,.08);
      transition:transform .14s ease, background .14s ease, border-color .14s ease, box-shadow .14s ease;
    }

    .pair-btn:hover{transform:translateY(-1px)}

    .pair-btn.active{
      background:linear-gradient(180deg, #86df78, var(--green-2));
      border-color:var(--green-border);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.24), 0 0 0 2px var(--green-shadow);
    }

    .tiles-row{
      display:grid;
      grid-template-columns:repeat(7, minmax(0, 1fr));
      gap:8px;
      margin-bottom:14px;
    }

    .tile-btn{
      min-height:126px;
      padding:4px;
      border-radius:14px;
      background:var(--tile-frame);
      border:1px solid var(--tile-border);
      display:grid;
      place-items:center;
      transition:transform .14s ease, border-color .14s ease, box-shadow .14s ease, background .14s ease;
    }

    .tile-btn:hover{transform:translateY(-1px)}

    .tile-btn.selected{
      background:var(--tile-selected);
      border-color:var(--green-border);
      box-shadow:0 0 0 3px rgba(121,218,108,.16);
    }

    .confirm-btn{
      width:100%;
      height:48px;
      border-radius:12px;
      background:linear-gradient(180deg, #7fe171, #67cb59);
      border:1px solid var(--green-border);
      color:#fbfff8;
      font-size:1.02rem;
      font-weight:800;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.26), 0 7px 18px rgba(58,108,47,.18);
      margin-bottom:108px;
    }

    .confirm-btn:disabled{
      opacity:.58;
      cursor:not-allowed;
    }

    .hand-zone{
      width:min(506px, calc(100vw - 48px));
      margin-top:auto;
      position:relative;
    }

    .hand-zone::after{
      content:"";
      position:absolute;
      left:10%;
      right:10%;
      bottom:0;
      height:18px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,0,0,.18) 0%, rgba(0,0,0,.1) 44%, transparent 76%);
      filter:blur(10px);
      pointer-events:none;
    }

    .hand-tray{
      min-height:86px;
      border-radius:13px;
      border:1px solid var(--tray-border);
      background:linear-gradient(180deg, rgba(72,81,111,.78), rgba(57,66,94,.82));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06), 0 8px 22px var(--shadow);
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding:10px 12px 8px;
      overflow:hidden;
    }

    .hand-empty{
      align-items:center;
      color:rgba(255,255,255,.6);
      font-size:.9rem;
    }

    .hand-tile-wrap{
      flex:0 0 auto;
      margin-left:-3px;
      transform-origin:center bottom;
    }

    .hand-tile-wrap:first-child{margin-left:0}

    .domino{
      display:grid;
      grid-template-rows:1fr 1fr;
      overflow:hidden;
      border-radius:10px;
      border:1px solid var(--domino-edge);
      background:linear-gradient(180deg, var(--domino-top), var(--domino));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.62), 0 3px 8px rgba(0,0,0,.11);
    }

    .domino.large{width:64px;height:98px}
    .domino.small{width:36px;height:56px}

    .half{
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at 28% 22%, rgba(255,255,255,.48), transparent 26%),
        linear-gradient(180deg, #faf6ec, var(--domino));
    }

    .half + .half{border-top:2px solid var(--domino-line)}

    .pips{
      width:24px;
      height:24px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      grid-template-rows:repeat(3,1fr);
    }

    .domino.small .pips{width:16px;height:16px}

    .pip{
      width:5px;
      height:5px;
      border-radius:50%;
      background:var(--pip);
      box-shadow:0 .5px 0 rgba(255,255,255,.25) inset;
      place-self:center;
      opacity:0;
    }

    .domino.small .pip{width:3.6px;height:3.6px}
    .pip.show{opacity:1}

    @media (max-width:700px){
      .app{padding-top:54px}
      .board,.cluster{width:min(560px, calc(100vw - 24px))}
      .domino.large{width:56px;height:88px}
      .tile-btn{min-height:114px}
      .confirm-btn{margin-bottom:72px}
      .hand-zone{width:min(462px, calc(100vw - 28px))}
    }

    @media (max-width:560px){
      .app{padding:36px 12px 18px}
      .board,.cluster{width:100%}
      .title{font-size:1.18rem}
      .counter{font-size:.93rem;margin-bottom:12px}
      .pair-grid{gap:7px}
      .pair-btn{height:38px;font-size:.88rem}
      .tiles-row{gap:6px}
      .domino.large{width:44px;height:76px}
      .tile-btn{min-height:96px;padding:3px;border-radius:12px}
      .confirm-btn{height:46px;font-size:.97rem;margin-bottom:40px}
      .hand-zone{width:min(396px, calc(100vw - 20px))}
      .hand-tray{min-height:78px;padding:9px 10px 7px}
      .domino.small{width:30px;height:47px}
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="board cluster">
      <h1 class="title">Selecciona exactamente 7 fichas</h1>
      <p id="counter" class="counter">0 / 7 seleccionadas</p>
      <div id="pairGrid" class="pair-grid"></div>
      <div id="tilesRow" class="tiles-row"></div>
      <button id="confirmBtn" class="confirm-btn" type="button">✓ Confirmar mano</button>
    </section>

    <section class="hand-zone" aria-label="Selected domino hand">
      <div id="handTray" class="hand-tray hand-empty">Selecciona fichas para formar tu mano</div>
    </section>
  </main>

  <script>
    const PIP_MAP={0:[],1:[4],2:[0,8],3:[0,4,8],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]};
    const values=Array.from({length:7},(_,i)=>i);
    const state={activePair:3,selected:[[1,4],[2,3],[1,2],[3,6],[4,6],[2,5],[3,5]]};

    const pairGrid=document.getElementById('pairGrid');
    const tilesRow=document.getElementById('tilesRow');
    const counter=document.getElementById('counter');
    const confirmBtn=document.getElementById('confirmBtn');
    const handTray=document.getElementById('handTray');

    const key=tile=>`${tile[0]}-${tile[1]}`;
    const normalize=(a,b)=>a<=b?[a,b]:[b,a];
    const tilesForPair=n=>values.map(v=>normalize(n,v));

    function pips(n){
      const visible=new Set(PIP_MAP[n]);
      return `<div class="pips">${Array.from({length:9},(_,i)=>`<span class="pip ${visible.has(i)?'show':''}"></span>`).join('')}</div>`;
    }

    function domino(a,b,size='large'){
      return `<div class="domino ${size}"><div class="half">${pips(a)}</div><div class="half">${pips(b)}</div></div>`;
    }

    function renderPairs(){
      pairGrid.innerHTML=values.map(n=>`
        <button class="pair-btn ${state.activePair===n?'active':''}" type="button" data-pair="${n}">${n}-${n}</button>
      `).join('');

      pairGrid.querySelectorAll('.pair-btn').forEach(btn=>{
        btn.onclick=()=>{
          state.activePair=Number(btn.dataset.pair);
          render();
        };
      });
    }

    function renderTiles(){
      const selectedKeys=new Set(state.selected.map(key));
      tilesRow.innerHTML=tilesForPair(state.activePair).map(tile=>{
        const tileKey=key(tile);
        return `
          <button class="tile-btn ${selectedKeys.has(tileKey)?'selected':''}" type="button" data-tile="${tileKey}" aria-label="Ficha ${tileKey}">
            ${domino(tile[0],tile[1],'large')}
          </button>
        `;
      }).join('');

      tilesRow.querySelectorAll('.tile-btn').forEach(btn=>{
        btn.onclick=()=>{
          const tile=btn.dataset.tile.split('-').map(Number);
          const tileKey=key(tile);
          const existingIndex=state.selected.findIndex(item=>key(item)===tileKey);

          if(existingIndex>=0){
            state.selected.splice(existingIndex,1);
          }else if(state.selected.length<7){
            state.selected.push(tile);
          }

          render();
        };
      });
    }

    function renderCounter(){
      counter.textContent=`${state.selected.length} / 7 seleccionadas`;
      confirmBtn.disabled=state.selected.length!==7;
    }

    function renderHand(){
      if(!state.selected.length){
        handTray.className='hand-tray hand-empty';
        handTray.textContent='Selecciona fichas para formar tu mano';
        return;
      }

      handTray.className='hand-tray';
      const total=state.selected.length;
      const center=(total-1)/2;

      handTray.innerHTML=state.selected.map((tile,index)=>{
        const distance=index-center;
        const angle=distance*2.4;
        const lift=Math.abs(distance)*1.1;
        return `
          <div class="hand-tile-wrap" style="transform:translateY(${lift}px) rotate(${angle}deg)">
            ${domino(tile[0],tile[1],'small')}
          </div>
        `;
      }).join('');
    }

    function render(){
      renderPairs();
      renderTiles();
      renderCounter();
      renderHand();
    }

    confirmBtn.addEventListener('click',()=>{
      if(state.selected.length===7){
        confirmBtn.textContent='✓ Mano confirmada';
      }
    });

    render();
  </script>
</body>
</html>
