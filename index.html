<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Domino Assistant R3F</title>
  <style>
    body{margin:0;background:#0f172a;color:#e5e7eb;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
    .app{max-width:760px;margin:0 auto;padding:12px}
    .card{background:#111827;border:1px solid #374151;border-radius:12px;padding:12px;margin-bottom:10px}
    h1{font-size:1.05rem;margin:0 0 6px}
    .muted{color:#9ca3af;font-size:.9rem}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:10px}
    .tile-btn{border:1px solid #4b5563;background:#1f2937;border-radius:10px;padding:8px;min-height:62px}
    .tile-btn.sel{border-color:#22c55e;background:#14532d}
    .domino-face{display:grid;grid-template-columns:1fr 1fr;gap:6px;align-items:center}
    .half{min-height:44px;border-radius:8px;background:#e5e7eb;position:relative;display:grid;place-items:center}
    .half.right{border-left:2px solid #111827}
    .pips{width:30px;height:30px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr)}
    .pip{width:6px;height:6px;border-radius:99px;background:#111827;place-self:center;opacity:0}
    .show{opacity:1}
    .selected-strip{display:flex;gap:8px;overflow:auto;padding-top:6px}
    .selected-strip .domino-face{min-width:72px}
    #r3fWrap{height:180px;border:1px solid #374151;border-radius:10px;overflow:hidden;margin-top:8px;background:#0b1220}
    .cta{margin-top:10px;display:none;border:1px solid #22c55e;background:#14532d;color:#dcfce7;border-radius:10px;padding:10px 12px;font-weight:700;width:100%}
    .cta.show{display:block}
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <h1>Selecciona exactamente 7 fichas</h1>
      <div id="counter" class="muted">Seleccionadas: 0/7</div>
      <div id="grid" class="grid"></div>
      <button id="confirmCta" class="cta">✓ Confirmar mano</button>
    </div>

    <div class="card">
      <h1>Vista de mano seleccionada</h1>
      <div id="fallback2d" class="selected-strip"></div>
      <div id="r3fWrap"></div>
      <div id="renderNote" class="muted" style="margin-top:6px">R3F activo si WebGL está disponible; fallback 2D incluido.</div>
    </div>
  </div>

  <script>
    const PIP_MAP={
      0:[],1:[4],2:[0,8],3:[0,4,8],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]
    };
    const allTiles=[]; for(let a=0;a<=6;a++) for(let b=a;b<=6;b++) allTiles.push([a,b]);
    const key=t=>`${t[0]}-${t[1]}`;
    const state={selected:[]};

    const grid=document.getElementById('grid');
    const counter=document.getElementById('counter');
    const cta=document.getElementById('confirmCta');
    const fallback2d=document.getElementById('fallback2d');

    function pips(n){
      const visible=new Set(PIP_MAP[n]);
      return `<div class="pips">${Array.from({length:9},(_,i)=>`<span class="pip ${visible.has(i)?'show':''}"></span>`).join('')}</div>`;
    }
    function face(a,b){
      return `<div class="domino-face"><div class="half">${pips(a)}</div><div class="half right">${pips(b)}</div></div>`;
    }
    function render(){
      const set=new Set(state.selected.map(key));
      grid.innerHTML=allTiles.map(t=>`<button class="tile-btn ${set.has(key(t))?'sel':''}" data-t="${key(t)}">${face(t[0],t[1])}</button>`).join('');
      [...grid.querySelectorAll('.tile-btn')].forEach(btn=>btn.onclick=()=>{
        const t=btn.dataset.t.split('-').map(Number); const k=key(t);
        const idx=state.selected.findIndex(x=>key(x)===k);
        if(idx>=0) state.selected.splice(idx,1); else if(state.selected.length<7) state.selected.push(t);
        render(); renderFallback(); renderR3F();
      });
      counter.textContent=`Seleccionadas: ${state.selected.length}/7`;
      cta.classList.toggle('show', state.selected.length===7);
    }
    function renderFallback(){
      fallback2d.innerHTML = state.selected.map(t=>face(t[0],t[1])).join('') || '<span class="muted">Sin fichas seleccionadas.</span>';
    }

    function hasWebGL(){
      try{ const c=document.createElement('canvas'); return !!(c.getContext('webgl')||c.getContext('experimental-webgl')); }catch{return false;}
    }

    window.__dominoSelected = () => state.selected;
    render(); renderFallback();
  </script>

  <script type="module">
    const wrap=document.getElementById('r3fWrap');
    const note=document.getElementById('renderNote');
    const canWebGL = (()=>{try{const c=document.createElement('canvas'); return !!(c.getContext('webgl')||c.getContext('experimental-webgl'));}catch{return false;}})();
    if(!canWebGL){ wrap.style.display='none'; note.textContent='WebGL no disponible: usando fallback 2D.'; }
    else {
      const React = await import('https://esm.sh/react@18');
      const ReactDOM = await import('https://esm.sh/react-dom@18/client');
      const Fiber = await import('https://esm.sh/@react-three/fiber@8.17.10?deps=react@18,react-dom@18,three@0.160.0');
      const Drei = await import('https://esm.sh/@react-three/drei@9.105.6?deps=@react-three/fiber@8.17.10,react@18,react-dom@18,three@0.160.0');

      function TileMesh({x}){
        return React.createElement('mesh',{position:[x,0,0]},[
          React.createElement('boxGeometry',{args:[0.7,1.05,0.08],key:'g'}),
          React.createElement('meshStandardMaterial',{color:'#f3f4f6',key:'m'})
        ]);
      }
      function Scene(){
        const selected = (window.__dominoSelected?.() || []).slice(0,7);
        return React.createElement(React.Fragment,null,
          React.createElement('ambientLight',{intensity:0.9}),
          React.createElement('directionalLight',{position:[2,3,2],intensity:1}),
          selected.map((_,i)=>React.createElement(TileMesh,{x:(i-3)*0.8,key:i})),
          React.createElement(Drei.OrbitControls,{enablePan:false,enableZoom:false,minPolarAngle:1.2,maxPolarAngle:1.9})
        );
      }

      const root = ReactDOM.createRoot(wrap);
      function renderR3F(){
        root.render(React.createElement(Fiber.Canvas,{camera:{position:[0,1.2,4]}},React.createElement(Scene)));
      }
      window.renderR3F = renderR3F;
      renderR3F();
      setInterval(renderR3F,500);
    }
  </script>
</body>
</html>
